<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Fido Playhouse — Williamsburg · Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bp:#4C82A8;
  --bp-dark:#3D6E91;
  --bp-darker:#2E5665;
  --bl:#7AACB8;
  --gold:#C9A96E;
  --gold-light:#D7BA81;
  --orange:#D76B00;
  --white:#FFFFFF;
  --surface-glass:rgba(255,255,255,.08);
  --surface-glass-strong:rgba(255,255,255,.14);
  --border-subtle:rgba(255,255,255,.10);
  --border-soft:rgba(255,255,255,.18);
  --text-on-dark:#FFFFFF;
  --text-on-dark-muted:rgba(255,255,255,.68);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Lato',sans-serif;
  color:var(--text-on-dark);
  background:linear-gradient(180deg,#3D6E91 0%,#4C82A8 60%,#3D6E91 100%);
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(circle at 12% 18%,rgba(201,169,110,.10),transparent 38%),
    radial-gradient(circle at 88% 12%,rgba(255,255,255,.06),transparent 32%),
    radial-gradient(circle at 50% 92%,rgba(46,86,101,.55),transparent 50%);
  pointer-events:none;z-index:0;
}
.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

/* ── SPLASH SCREEN ─────────────────────────────────────────────── */
#splash{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(circle at 18% 18%,rgba(215,107,0,.15),transparent 28%),
    radial-gradient(circle at 84% 16%,rgba(76,130,168,.16),transparent 24%),
    radial-gradient(circle at 50% 84%,rgba(215,107,0,.10),transparent 28%),
    linear-gradient(160deg,rgba(76,130,168,.97) 0%,rgba(61,110,145,.985) 52%,rgba(76,130,168,.99) 100%);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:opacity .5s ease;
}
#splash.hide{opacity:0;pointer-events:none}
.splash-shell{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;text-align:center;padding:20px;
}
.splash-tagline{
  font-family:'Righteous',sans-serif;
  font-size:clamp(20px,3vw,30px);
  letter-spacing:.5px;color:var(--white);
  text-shadow:0 10px 26px rgba(0,0,0,.18);
  display:inline-block;overflow:hidden;
  clip-path:inset(0 100% 0 0);
  animation:revealText 1.45s cubic-bezier(.23,.82,.22,1) .18s forwards;
}
.splash-mark{
  position:relative;
  width:min(56vw,220px);height:min(56vw,220px);
  display:flex;align-items:center;justify-content:center;
  margin:6px 0;
}
.splash-mark::before,.splash-mark::after{
  content:'';position:absolute;inset:7%;border-radius:50%;
  border:1px solid rgba(255,255,255,.24);
  opacity:0;transform:scale(.88);
  animation:logoPulse 2.2s ease-out infinite;
}
.splash-mark::after{inset:1%;border-color:rgba(201,169,110,.22);animation-delay:.6s}
.splash-logo{
  width:min(44vw,170px);height:min(44vw,170px);
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 14px 40px rgba(0,0,0,.22)) drop-shadow(0 4px 14px rgba(201,169,110,.35));
  animation:logoSettle 1.6s cubic-bezier(.22,.78,.17,1) both;
  position:relative;z-index:2;
}
.splash-brand{
  display:inline-block;overflow:hidden;
  clip-path:inset(0 100% 0 0);
  animation:revealText 1.2s cubic-bezier(.23,.82,.22,1) .92s forwards;
}
.splash-brand-inner{display:flex;flex-direction:column;align-items:center;gap:6px}
.splash-name{font-family:'Righteous',sans-serif;font-size:clamp(28px,4vw,38px);letter-spacing:.8px;color:var(--white);line-height:1.05}
.splash-loc{font-size:13px;color:rgba(255,255,255,.78);letter-spacing:3.4px;text-transform:uppercase;font-weight:700}
@keyframes revealText{0%{clip-path:inset(0 100% 0 0);opacity:.12}100%{clip-path:inset(0 0 0 0);opacity:1}}
@keyframes logoSettle{0%{transform:translateY(12px) scale(.94);opacity:.65}60%{transform:translateY(-2px) scale(1.02);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}}
@keyframes logoPulse{0%{opacity:0;transform:scale(.84)}12%{opacity:.45}58%{opacity:.16}100%{opacity:0;transform:scale(1.22)}}

/* ── TOP BAR ───────────────────────────────────────────────────── */
.topbar{
  flex-shrink:0;
  padding:env(safe-area-inset-top) 24px 0;
  background:rgba(46,86,101,.78);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border-subtle);
  z-index:50;
}
.topbar-inner{
  display:grid;grid-template-columns:auto 1fr auto auto;
  align-items:center;gap:14px;height:64px;
}
.brand{display:flex;align-items:center;gap:14px}
.brand-mark{
  width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.brand-mark::before{
  content:'';
  position:absolute;
  inset:-2px;
  background:radial-gradient(circle,rgba(201,169,110,.45) 0%,rgba(201,169,110,.18) 45%,transparent 70%);
  filter:blur(6px);
  pointer-events:none;
  z-index:0;
}
.brand-mark img{
  width:100%;height:100%;object-fit:contain;
  position:relative;
  z-index:1;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));
}
.brand-text{display:flex;flex-direction:column;line-height:1.05}
.brand-name{font-family:'Righteous',sans-serif;font-size:14px;letter-spacing:.8px;color:var(--white)}
.brand-loc{font-size:9px;letter-spacing:2.4px;text-transform:uppercase;color:var(--gold-light);font-weight:700;margin-top:2px}

.live-pill{
  justify-self:center;
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 14px;border-radius:100px;
  background:rgba(255,255,255,.08);border:1px solid var(--border-soft);
  font-size:10px;letter-spacing:1.6px;text-transform:uppercase;
  font-weight:700;color:var(--text-on-dark-muted);
}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:#5CD68A;
  animation:livePulse 2s ease-in-out infinite;
}
@keyframes livePulse{
  0%,100%{box-shadow:0 0 0 0 rgba(92,214,138,.55)}
  50%{box-shadow:0 0 0 7px rgba(92,214,138,0)}
}

.mode-toggle{
  display:flex;background:rgba(255,255,255,.06);
  border:1px solid var(--border-soft);border-radius:100px;
  padding:3px;gap:2px;
}
.mode-btn{
  padding:6px 12px;border-radius:100px;border:none;
  background:transparent;color:var(--text-on-dark-muted);
  font-family:'Lato',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;
  transition:.2s;display:flex;align-items:center;gap:5px;
}
.mode-btn svg{width:13px;height:13px}
.mode-btn.on{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--bp-darker)}

.clock{display:flex;flex-direction:column;align-items:flex-end;line-height:1.05}
.clock-time{font-family:'Righteous',sans-serif;font-size:18px;letter-spacing:1px;color:var(--white);font-variant-numeric:tabular-nums}
.clock-date{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-on-dark-muted);font-weight:700;margin-top:3px}

/* ── MAIN CONTAINER ────────────────────────────────────────────── */
.main-area{flex:1;position:relative;overflow:hidden}

/* ── PRESENTATION MODE (slideshow) ─────────────────────────────── */
#presentation{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .4s}
#presentation.active{opacity:1;pointer-events:auto}

.slideshow{position:relative;width:100%;height:100%;overflow:hidden}
.slide{
  position:absolute;inset:0;display:flex;
  opacity:0;pointer-events:none;
  transition:opacity 1s ease;will-change:opacity;
}
.slide.on{opacity:1;pointer-events:auto}

.slide-half{
  position:relative;flex:1;height:100%;overflow:hidden;
  border-right:1px solid rgba(255,255,255,.16);
}
.slide-half:last-child{border-right:none}

.bg-blur{
  position:absolute;inset:-8%;
  background-size:cover;background-position:center;
  filter:blur(28px) brightness(.55) saturate(1.1);
  z-index:0;
}
.bg-photo{
  position:absolute;inset:0;
  background-size:contain;background-position:center 38%;
  background-repeat:no-repeat;z-index:1;
  animation:kenBurns 14s ease-in-out infinite alternate;
}
@keyframes kenBurns{
  from{transform:scale(1)}
  to{transform:scale(1.06)}
}
.bg-overlay{
  position:absolute;inset:0;z-index:2;
  background:linear-gradient(to bottom,
    rgba(46,86,101,0) 0%,rgba(46,86,101,0) 35%,
    rgba(46,86,101,.55) 65%,rgba(46,86,101,.97) 100%);
}
.bg-fallback{
  position:absolute;inset:0;z-index:1;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--bp-darker),var(--bp));
  font-family:'Righteous',sans-serif;
  font-size:clamp(60px,12vw,140px);
  color:rgba(201,169,110,.35);letter-spacing:4px;
}

.slide-info{
  position:absolute;left:0;right:0;bottom:0;z-index:3;
  padding:0 48px 60px;
}
.slide-name{
  font-family:'Righteous',sans-serif;
  font-size:clamp(40px,7vw,84px);
  line-height:.95;letter-spacing:-1px;
  color:var(--white);
  text-shadow:0 4px 20px rgba(0,0,0,.45);
  margin-bottom:10px;
}
.slide-breed{
  font-size:clamp(13px,1.5vw,18px);
  font-weight:700;letter-spacing:2.4px;text-transform:uppercase;
  color:var(--gold-light);margin-bottom:18px;
  text-shadow:0 2px 8px rgba(0,0,0,.4);
}
.slide-badges{display:flex;gap:8px;flex-wrap:wrap}
.slide-badge{
  font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:6px 14px;border-radius:100px;
  border:1px solid rgba(255,255,255,.45);
  background:rgba(46,86,101,.45);color:var(--white);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  text-shadow:0 1px 2px rgba(0,0,0,.3);
}
.slide-badge.gold{background:rgba(201,169,110,.4);border-color:rgba(215,186,129,.7)}
.slide-badge.orange{background:rgba(215,107,0,.45);border-color:rgba(240,160,80,.65)}

/* Birthday */
.slide-half.bday::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:5;
  border:5px solid transparent;
  animation:bdayFrame 2.4s ease-in-out infinite alternate;
}
@keyframes bdayFrame{
  0%{border-color:var(--gold);box-shadow:inset 0 0 50px rgba(201,169,110,.35)}
  100%{border-color:var(--gold-light);box-shadow:inset 0 0 70px rgba(215,186,129,.45)}
}
.bday-banner{
  position:absolute;top:24px;left:24px;z-index:6;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:var(--bp-darker);font-size:13px;font-weight:700;
  letter-spacing:.6px;padding:8px 18px;border-radius:100px;
  box-shadow:0 6px 20px rgba(201,169,110,.5);
  display:flex;align-items:center;gap:8px;
  animation:bdayPop 1.5s ease-in-out infinite alternate;
}
@keyframes bdayPop{0%{transform:scale(1)}100%{transform:scale(1.05)}}

.bday-confetti{position:absolute;inset:0;pointer-events:none;z-index:7;overflow:hidden}
.confetti-piece{
  position:absolute;width:8px;height:8px;
  background:var(--gold-light);
  animation:confettiFall 4s linear infinite;
}
.confetti-piece:nth-child(odd){background:var(--white);border-radius:50%;width:6px;height:6px}
.confetti-piece:nth-child(3n){background:var(--gold)}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* Counter, dots, arrows, progress */
.counter{
  position:absolute;top:24px;right:24px;z-index:20;
  background:rgba(255,255,255,.92);color:var(--bp-darker);
  font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;
  padding:7px 16px;border-radius:100px;
  box-shadow:0 4px 14px rgba(0,0,0,.18);
}
.dots{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:20}
.dot{height:7px;width:7px;border-radius:100px;background:rgba(255,255,255,.35);cursor:pointer;transition:.3s;border:none;padding:0}
.dot.on{background:var(--gold-light);width:24px}
.arrow{
  position:absolute;top:50%;transform:translateY(-50%);z-index:20;
  width:46px;height:46px;border-radius:50%;
  background:rgba(255,255,255,.92);border:none;color:var(--bp-darker);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(0,0,0,.2);transition:.2s;
}
.arrow:hover{background:var(--white);transform:translateY(-50%) scale(1.06)}
.arrow svg{width:22px;height:22px}
.arrow.prev{left:18px}
.arrow.next{right:18px}
.progress-bar{
  position:absolute;bottom:0;left:0;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--gold-light));
  z-index:25;border-radius:0 2px 0 0;width:0%;
}

/* ── LIST MODE ─────────────────────────────────────────────────── */
#list{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .4s;overflow-y:auto}
#list.active{opacity:1;pointer-events:auto}
.list-inner{padding:28px 24px 60px;max-width:1280px;margin:0 auto;width:100%}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap}
.page-title{font-family:'Righteous',sans-serif;font-size:34px;letter-spacing:-.3px;color:var(--white);line-height:1}
.page-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-light);font-weight:700;margin-top:8px}
.head-stats{display:flex;gap:10px;flex-wrap:wrap}
.stat-pill{
  background:var(--surface-glass);border:1px solid var(--border-soft);
  border-radius:14px;padding:10px 16px;
  display:flex;flex-direction:column;align-items:flex-start;gap:2px;min-width:88px;
}
.stat-pill-label{font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:var(--text-on-dark-muted);font-weight:700}
.stat-pill-value{font-family:'Righteous',sans-serif;font-size:22px;color:var(--white);letter-spacing:.5px;font-variant-numeric:tabular-nums}
.stat-pill-value.gold{color:var(--gold-light)}

.section{margin-bottom:32px;animation:sectionFadeIn .5s cubic-bezier(.22,.78,.17,1) both}
@keyframes sectionFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-head{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-subtle)}
.section-title{font-family:'Righteous',sans-serif;font-size:18px;color:var(--white);letter-spacing:.4px}
.section-count{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--bp-darker);font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold-light));padding:4px 12px;border-radius:100px}
.section-icon{width:30px;height:30px;border-radius:9px;background:var(--surface-glass);border:1px solid var(--border-soft);display:flex;align-items:center;justify-content:center;color:var(--gold-light)}
.section-icon svg{width:16px;height:16px}

.dog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.dog-card{
  background:var(--surface-glass);border:1px solid var(--border-soft);
  border-radius:18px;padding:18px;
  display:flex;align-items:center;gap:14px;
  transition:.25s ease;position:relative;overflow:hidden;
}
.dog-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent 60%);pointer-events:none}
.dog-card:hover{transform:translateY(-2px);background:var(--surface-glass-strong);border-color:rgba(201,169,110,.4)}
.dog-photo{
  width:62px;height:62px;border-radius:50%;flex-shrink:0;
  background-size:cover;background-position:center;
  background-color:rgba(255,255,255,.08);
  border:2px solid var(--gold);
  box-shadow:0 4px 14px rgba(0,0,0,.18);
  display:flex;align-items:center;justify-content:center;
  font-family:'Righteous',sans-serif;font-size:20px;color:var(--gold-light);
  position:relative;z-index:1;
}
.dog-info{flex:1;min-width:0;position:relative;z-index:1}
.dog-name{font-family:'Righteous',sans-serif;font-size:18px;color:var(--white);letter-spacing:.2px;line-height:1.1;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dog-breed{font-size:11px;color:var(--text-on-dark-muted);font-weight:700;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dog-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.badge{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 9px;border-radius:100px;border:1px solid var(--border-soft);background:rgba(255,255,255,.06);color:var(--text-on-dark-muted)}
.badge.gold{background:rgba(201,169,110,.18);border-color:rgba(201,169,110,.4);color:var(--gold-light)}
.badge.checkout{background:rgba(215,107,0,.16);border-color:rgba(215,107,0,.4);color:#F0A050}
.badge.boarding{background:rgba(122,172,184,.18);border-color:rgba(122,172,184,.45);color:#A8D0DC}
.dog-bday{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:13px;z-index:2;animation:bdayPop 1.6s ease-in-out infinite alternate;box-shadow:0 4px 12px rgba(201,169,110,.4)}

/* ── EMPTY / LOADING ──────────────────────────────────────────── */
.state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:24px}
.state-icon{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border-soft);display:flex;align-items:center;justify-content:center;color:var(--gold-light)}
.state-icon svg{width:38px;height:38px}
.state-title{font-family:'Righteous',sans-serif;font-size:24px;color:var(--white);letter-spacing:.3px}
.state-text{font-size:14px;color:var(--text-on-dark-muted);letter-spacing:.3px;line-height:1.5;max-width:380px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.14);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error-banner{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:100;
  background:rgba(215,107,0,.9);color:var(--white);
  padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;
  box-shadow:0 8px 24px rgba(0,0,0,.3);display:none;max-width:90vw;
}
.error-banner.show{display:block}

/* ── RESPONSIVE ───────────────────────────────────────────────── */
@media(max-width:768px){
  .slide{flex-direction:column}
  .slide-half{flex:1;border-right:none;border-bottom:1px solid rgba(255,255,255,.16)}
  .slide-half:last-child{border-bottom:none}
  .slide-info{padding:0 24px 32px}
  .slide-name{font-size:42px}
  .slide-breed{font-size:13px;letter-spacing:1.8px;margin-bottom:12px}
  .slide-badge{font-size:10px;padding:4px 10px}
  .bday-banner{font-size:11px;padding:6px 12px;top:14px;left:14px}
  .arrow{width:38px;height:38px}
  .arrow.prev{left:8px}
  .arrow.next{right:8px}
  .counter{font-size:10px;padding:5px 12px;top:14px;right:14px}
}
@media(max-width:640px){
  .topbar-inner{height:58px;gap:6px}
  .brand-name{font-size:12px}
  .brand-loc{font-size:8px;letter-spacing:1.6px}
  .brand-mark{width:36px;height:36px}
  .live-pill{padding:4px 8px;font-size:9px;letter-spacing:.8px}
  .live-pill .live-label{display:none}
  .mode-btn{padding:5px 9px;font-size:9px;letter-spacing:.8px}
  .mode-btn .mode-label{display:none}
  .clock-time{font-size:14px}
  .clock-date{font-size:8px;letter-spacing:1.2px}
  .list-inner{padding:20px 16px 50px}
  .page-title{font-size:26px}
  .page-sub{font-size:10px}
  .stat-pill{padding:8px 12px;min-width:72px}
  .stat-pill-value{font-size:18px}
  .dog-grid{grid-template-columns:1fr;gap:10px}
  .dog-card{padding:14px}
  .dog-photo{width:54px;height:54px;font-size:17px}
  .dog-name{font-size:16px}

}

<body>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
import {
  getFirestore, collection, query, where, onSnapshot, doc, getDoc, Timestamp
} from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

// ── CONFIG ────────────────────────────────────────────────────
const LOCATION_ID = 'williamsburg';
const SLIDE_DURATION = 7000; // 7 seconds per slide

const firebaseConfig = {
  apiKey: 'AIzaSyBxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx', // TODO replace
  authDomain: 'fido-playhouse.firebaseapp.com',
  projectId: 'fido-playhouse',
  storageBucket: 'fido-playhouse.appspot.com',
  messagingSenderId: '206926237469',
  appId: '1:206926237469:web:xxxxxxxxxxxxxxxxxxxxxx', // TODO replace
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── HELPERS ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const isMobile = () => window.innerWidth <= 768;
const escapeHtml = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function tsToDate(ts){
  if(!ts) return null;
  if(ts instanceof Date) return ts;
  if(ts instanceof Timestamp) return ts.toDate();
  if(typeof ts.toDate === 'function') return ts.toDate();
  if(typeof ts === 'string'){const d=new Date(ts);return isNaN(d)?null:d}
  if(ts.seconds !== undefined) return new Date(ts.seconds*1000);
  return null;
}
const startOfToday = () => {const d=new Date();d.setHours(0,0,0,0);return d};
const isSameDay = (a,b) => a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
function isAfter1930(){
  const n=new Date();
  return n.getHours() > 19 || (n.getHours()===19 && n.getMinutes()>=30);
}
function isBirthdayToday(dob){
  const d=tsToDate(dob);
  if(!d) return null;
  const n=new Date();
  if(d.getMonth()===n.getMonth()&&d.getDate()===n.getDate()){
    const age = n.getFullYear()-d.getFullYear();
    return age>=0 ? age : null;
  }
  return null;
}
function calcAge(dob){
  const d=tsToDate(dob);
  if(!d) return '';
  const n=new Date();
  let y=n.getFullYear()-d.getFullYear();
  const m=n.getMonth()-d.getMonth();
  if(m<0||(m===0&&n.getDate()<d.getDate())) y--;
  if(y<=0){
    let months=(n.getFullYear()-d.getFullYear())*12+(n.getMonth()-d.getMonth());
    if(n.getDate()<d.getDate()) months--;
    if(months<=0) return '< 1 mo';
    return months+' mo';
  }
  return y+' yr'+(y!==1?'s':'');
}
const dogPhoto = d => d?.customerPhotoUrl || d?.gingrPhotoUrl || d?.photoUrl || '';
const dogInitials = n => String(n||'').split(/\s+/).filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase()||'?';
const genderLabel = g => g==='male'?'Male':g==='female'?'Female':'';
function fixedLabel(d){
  if(d.fixed===undefined||d.fixed===null) return '';
  if(d.gender==='male') return d.fixed?'Neutered':'Intact';
  if(d.gender==='female') return d.fixed?'Spayed':'Intact';
  return d.fixed?'Fixed':'';
}
function fmtCheckoutBadge(co){
  const d=tsToDate(co);
  if(!d) return '';
  const t=new Date();
  if(isSameDay(d,t)){
    const h=d.getHours(),m=d.getMinutes();
    return `Out ${((h+11)%12)+1}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
  }
  return 'Out '+d.toLocaleDateString([],{month:'short',day:'numeric'});
}
function normalizeType(raw){
  const s=String(raw||'').toLowerCase().trim();
  if(!s) return 'other';
  // Gingr formats observed: "Daycare & Play | Full Day", "Daycare & Play | Half Day",
  //                         "Boarding | Slumber Pawty", "Boarding"
  // Only 3 real categories: full day, half day, and slumber/boarding (one bucket).
  if(s.includes('board')||s.includes('slumber')) return 'boarding';
  if(s.includes('half')) return 'halfday';
  if(s.includes('full')||s.includes('day care')||s.includes('daycare')) return 'fullday';
  return 'other';
}

// Short, display-friendly label used in slideshow badges + list cards.
function typeShortLabel(rawType){
  const key = normalizeType(rawType);
  return ({
    halfday:  'Half Day',
    fullday:  'Full Day',
    boarding: 'Slumber Pawty',
    other:    String(rawType||'').trim() || 'Other'
  })[key];
}

const SECTION_DEFS = [
  {key:'halfday',label:'Half Day Daycare',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>'},
  {key:'fullday',label:'Full Day Daycare',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'},
  {key:'boarding',label:'Slumber Pawty & Boarding',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'},
  {key:'other',label:'Other',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>'},
];

// ── STATE ─────────────────────────────────────────────────────
const dogCache = new Map();
let currentAppointments = [];
let visibleDogs = []; // [{appt, dog}] enriched + filtered
let currentMode = localStorage.getItem('fido_staff_mode_v1') || 'presentation';

// ── CLOCK ─────────────────────────────────────────────────────
function tickClock(){
  const n=new Date();
  $('clk-time').textContent = n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:true});
  $('clk-date').textContent = n.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
}
tickClock();
setInterval(tickClock, 15000);

// Re-render at 19:30 boundary + at midnight
let lastBoundary = isAfter1930();
let lastDateKey = new Date().toDateString();
setInterval(()=>{
  const b = isAfter1930();
  const k = new Date().toDateString();
  if(b !== lastBoundary){lastBoundary = b; render()}
  if(k !== lastDateKey){lastDateKey = k; render()}
}, 30000);

// ── DATA HYDRATION ────────────────────────────────────────────
async function getDog(dogId){
  if(!dogId) return null;
  if(dogCache.has(dogId)) return dogCache.get(dogId);
  try{
    const snap = await getDoc(doc(db,'locations',LOCATION_ID,'dogs',dogId));
    if(!snap.exists()){dogCache.set(dogId,null); return null}
    const data = {id:snap.id,...snap.data()};
    dogCache.set(dogId, data);
    return data;
  }catch(e){console.error('getDog failed',e); return null}
}

function shouldShowAppointment(appt){
  // Exclude appointments that are explicitly done or canceled
  const status = String(appt.status || '').toLowerCase();
  if(status === 'checked_out' || status === 'canceled' || status === 'cancelled' || status === 'no_show') return false;

  const now = new Date();
  // Real schema uses startDate/endDate (not checkInTime/checkOutTime)
  const ci = tsToDate(appt.startDate || appt.checkInAt || appt.checkInTime);
  const co = tsToDate(appt.endDate || appt.checkOutTime);
  if(!ci) return false;
  if(ci > now) return false;
  if(!co) return true;
  if(co < now) return false;
  if(isAfter1930() && isSameDay(co,now)) return false;
  return true;
}

// ── MAIN RENDER ───────────────────────────────────────────────
async function render(){
  const visible = currentAppointments.filter(shouldShowAppointment);
  const enriched = await Promise.all(visible.map(async appt => {
    const dog = appt.dogId ? await getDog(appt.dogId) : null;
    return {appt, dog};
  }));
  const valid = enriched.filter(e => e.dog);

  // Deduplicate by dogId. A dog can have multiple appointments visible
  // (e.g. an old "checked_out" doc plus a fresh "checked_in" one, or
  // duplicates from webhook race conditions). Keep the most relevant:
  //   1. Prefer status==='checked_in'
  //   2. Then prefer most recent startDate
  //   3. Fall back to most recent updatedAt/createdAt
  const byDog = new Map();
  valid.forEach(entry => {
    const dogId = entry.dog.id;
    const existing = byDog.get(dogId);
    if(!existing){byDog.set(dogId, entry); return}
    if(scoreAppointment(entry.appt) > scoreAppointment(existing.appt)){
      byDog.set(dogId, entry);
    }
  });
  visibleDogs = [...byDog.values()];

  // Render both modes (always update so switching feels instant)
  renderList();
  renderPresentation();
}

function scoreAppointment(a){
  // Higher score wins. 1B for checked_in status, then time-based tiebreak.
  let s = 0;
  if(a.status === 'checked_in') s += 1_000_000_000;
  const t = tsToDate(a.startDate || a.checkInAt || a.updatedAt || a.createdAt);
  if(t) s += t.getTime() / 1000; // seconds since epoch (~1.7B today, fits)
  return s;
}

// ── LIST RENDER ───────────────────────────────────────────────
function renderList(){
  const buckets = {halfday:[],fullday:[],boarding:[],other:[]};
  visibleDogs.forEach(e => {
    const t = normalizeType(e.appt.type || e.appt.reservation_type || e.appt.reservationType || e.appt.appointmentType);
    if(buckets[t]) buckets[t].push(e); else buckets.other.push(e);
  });
  Object.values(buckets).forEach(arr => arr.sort((a,b)=>String(a.dog.name||'').localeCompare(String(b.dog.name||''))));

  const total = visibleDogs.length;
  const boardingCount = buckets.boarding.length;
  $('stat-total').textContent = total;
  $('stat-boarding').textContent = boardingCount;

  const root = $('list-content');
  if(total === 0){
    root.innerHTML = `
      <div class="state" style="position:relative;padding:80px 24px">
        <div class="state-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>
          </svg>
        </div>
        <div class="state-title">No guests right now</div>
        <div class="state-text">Check-ins will appear here automatically as the day unfolds.</div>
      </div>`;
    return;
  }

  let html = '';
  for(const def of SECTION_DEFS){
    const items = buckets[def.key];
    if(!items.length) continue;
    html += `
      <section class="section">
        <div class="section-head">
          <div class="section-icon">${def.icon}</div>
          <h2 class="section-title">${def.label}</h2>
          <span class="section-count">${items.length} dog${items.length!==1?'s':''}</span>
        </div>
        <div class="dog-grid">${items.map(renderListCard).join('')}</div>
      </section>`;
  }
  root.innerHTML = html;
}

function renderListCard({appt, dog}){
  const photo = dogPhoto(dog);
  const initials = dogInitials(dog.name);
  const photoStyle = photo ? `background-image:url('${escapeHtml(photo)}');background-color:transparent` : '';
  const photoInner = photo ? '' : initials;
  const bdayAge = isBirthdayToday(dog.dob);
  const age = calcAge(dog.dob);
  const gender = genderLabel(dog.gender);
  const fixed = fixedLabel(dog);
  const checkoutBadge = fmtCheckoutBadge(appt.endDate || appt.checkOutTime);
  const co = tsToDate(appt.endDate || appt.checkOutTime);
  const isMultiDay = co && !isSameDay(co,new Date());

  const badges = [];
  if(checkoutBadge) badges.push(`<span class="badge ${isMultiDay?'boarding':'checkout'}">${checkoutBadge}</span>`);
  if(gender) badges.push(`<span class="badge">${gender}</span>`);
  if(fixed) badges.push(`<span class="badge">${fixed}</span>`);
  if(age) badges.push(`<span class="badge gold">${age}</span>`);

  return `
    <article class="dog-card">
      ${bdayAge!==null?`<div class="dog-bday" title="Birthday today!">🎂</div>`:''}
      <div class="dog-photo" style="${photoStyle}">${photoInner}</div>
      <div class="dog-info">
        <div class="dog-name">${escapeHtml(dog.name||'—')}</div>
        <div class="dog-breed">${escapeHtml(dog.breed||'—')}</div>
        <div class="dog-badges">${badges.join('')}</div>
      </div>
    </article>`;
}

// ── PRESENTATION RENDER ───────────────────────────────────────
let pairs = [];
let curIdx = 0;
let slideTimer = null;
let progressTimer = null;

function renderPresentation(){
  const ss = $('slideshow');
  const presState = $('pres-state');

  if(visibleDogs.length === 0){
    stopAutoplay();
    [...ss.querySelectorAll('.slide,.dot')].forEach(el => el.remove());
    $('counter').style.display = 'none';
    $('prev').style.display = 'none';
    $('next').style.display = 'none';
    $('progress').style.width = '0%';
    if(!presState){
      ss.innerHTML = emptyStateHTML();
    }else{
      presState.innerHTML = `
        <div class="state-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>
          </svg>
        </div>
        <div class="state-title">No guests right now</div>
        <div class="state-text">Check-ins will appear here automatically as the day unfolds.</div>`;
    }
    return;
  }

  // Remove state if it still exists
  if(presState) presState.remove();

  // Build pairs (2 per slide on desktop, 1 on mobile)
  // Sort by check-in time so newest arrivals appear in order
  const sorted = [...visibleDogs].sort((a,b)=>{
    const ca = tsToDate(a.appt.startDate || a.appt.checkInAt || a.appt.checkInTime)?.getTime() || 0;
    const cb = tsToDate(b.appt.startDate || b.appt.checkInAt || b.appt.checkInTime)?.getTime() || 0;
    return ca - cb;
  });
  const step = isMobile() ? 1 : 2;
  pairs = [];
  for(let i=0; i<sorted.length; i+=step){
    pairs.push(sorted.slice(i, i+step));
  }
  curIdx = Math.min(curIdx, pairs.length-1);
  if(curIdx < 0) curIdx = 0;

  // Render slide DOM
  const oldSlides = [...ss.querySelectorAll('.slide')];
  oldSlides.forEach(s => s.remove());

  pairs.forEach((pair,i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    if(i === curIdx) slide.classList.add('on');
    slide.innerHTML = pair.map(renderSlideHalf).join('');
    ss.appendChild(slide);
  });

  // Dots
  const dotsEl = $('dots');
  dotsEl.innerHTML = pairs.map((_,i) => `<button class="dot${i===curIdx?' on':''}" data-idx="${i}" type="button"></button>`).join('');
  [...dotsEl.querySelectorAll('.dot')].forEach(d => {
    d.addEventListener('click', () => goTo(+d.dataset.idx));
  });

  // Counter, arrows
  const counter = $('counter');
  counter.style.display = '';
  counter.textContent = `${visibleDogs.length} ${visibleDogs.length===1?'guest':'guests'} today`;

  if(pairs.length > 1){
    $('prev').style.display = '';
    $('next').style.display = '';
  }else{
    $('prev').style.display = 'none';
    $('next').style.display = 'none';
  }

  startAutoplay();
}

function emptyStateHTML(){
  return `<div class="state" id="pres-state">
    <div class="state-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>
      </svg>
    </div>
    <div class="state-title">No guests right now</div>
    <div class="state-text">Check-ins will appear here automatically as the day unfolds.</div>
  </div>`;
}

function renderSlideHalf({appt, dog}){
  const photo = dogPhoto(dog);
  const bdayAge = isBirthdayToday(dog.dob);
  const age = calcAge(dog.dob);
  const gender = genderLabel(dog.gender);
  const fixed = fixedLabel(dog);
  const co = tsToDate(appt.endDate || appt.checkOutTime);
  const isMultiDay = co && !isSameDay(co,new Date());
  const checkoutBadge = fmtCheckoutBadge(appt.endDate || appt.checkOutTime);
  const svcLabel = typeShortLabel(appt.type || appt.reservation_type || appt.reservationType || appt.appointmentType);

  const badges = [];
  // Service type leads — most relevant info at a glance.
  if(svcLabel) badges.push(`<span class="slide-badge gold">${escapeHtml(svcLabel)}</span>`);
  if(checkoutBadge) badges.push(`<span class="slide-badge ${isMultiDay?'gold':'orange'}">${checkoutBadge}</span>`);
  if(gender) badges.push(`<span class="slide-badge">${gender}</span>`);
  if(fixed) badges.push(`<span class="slide-badge">${fixed}</span>`);
  if(age) badges.push(`<span class="slide-badge">${age}</span>`);

  // Birthday confetti
  let confettiHTML = '';
  if(bdayAge !== null){
    const pieces = [];
    for(let i=0; i<24; i++){
      const left = Math.random()*100;
      const delay = Math.random()*4;
      const dur = 3+Math.random()*2;
      pieces.push(`<div class="confetti-piece" style="left:${left}%;animation-delay:${delay}s;animation-duration:${dur}s"></div>`);
    }
    confettiHTML = `<div class="bday-confetti">${pieces.join('')}</div>`;
  }

  const photoBlock = photo
    ? `<div class="bg-blur" style="background-image:url('${escapeHtml(photo)}')"></div>
       <div class="bg-photo" style="background-image:url('${escapeHtml(photo)}')"></div>`
    : `<div class="bg-fallback">${dogInitials(dog.name)}</div>`;

  return `
    <div class="slide-half${bdayAge!==null?' bday':''}">
      ${photoBlock}
      <div class="bg-overlay"></div>
      ${bdayAge!==null?`<div class="bday-banner">🎂 Happy ${bdayAge}${bdayAge===1?'st':bdayAge===2?'nd':bdayAge===3?'rd':'th'} Birthday, ${escapeHtml(String(dog.name||'').split(' ')[0])}!</div>`:''}
      ${confettiHTML}
      <div class="slide-info">
        <div class="slide-name">${escapeHtml(dog.name||'—')}</div>
        <div class="slide-breed">${escapeHtml(dog.breed||'—')}</div>
        <div class="slide-badges">${badges.join('')}</div>
      </div>
    </div>`;
}

function goTo(idx){
  if(!pairs.length) return;
  const slides = $('slideshow').querySelectorAll('.slide');
  const dots = $('dots').querySelectorAll('.dot');
  slides[curIdx]?.classList.remove('on');
  dots[curIdx]?.classList.remove('on');
  curIdx = ((idx % pairs.length) + pairs.length) % pairs.length;
  slides[curIdx]?.classList.add('on');
  dots[curIdx]?.classList.add('on');
  startAutoplay();
}

function startAutoplay(){
  stopAutoplay();
  if(pairs.length <= 1) return;
  // Reset progress bar
  const bar = $('progress');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  // Force reflow then animate
  requestAnimationFrame(()=>{
    bar.style.transition = `width ${SLIDE_DURATION}ms linear`;
    bar.style.width = '100%';
  });
  slideTimer = setTimeout(() => goTo(curIdx+1), SLIDE_DURATION);
}

function stopAutoplay(){
  if(slideTimer){clearTimeout(slideTimer); slideTimer = null}
  const bar = $('progress');
  if(bar){
    bar.style.transition = 'none';
    bar.style.width = '0%';
  }
}

$('prev').addEventListener('click', () => goTo(curIdx-1));
$('next').addEventListener('click', () => goTo(curIdx+1));
document.addEventListener('keydown', e => {
  if(currentMode !== 'presentation') return;
  if(e.key === 'ArrowLeft') goTo(curIdx-1);
  if(e.key === 'ArrowRight') goTo(curIdx+1);
});

// Pause on hover (desktop only)
$('slideshow').addEventListener('mouseenter', () => {
  if(!isMobile() && currentMode === 'presentation') stopAutoplay();
});
$('slideshow').addEventListener('mouseleave', () => {
  if(!isMobile() && currentMode === 'presentation') startAutoplay();
});

// Re-build pairs on resize (mobile/desktop transition)
let lastViewportW = window.innerWidth;
let resizeT = null;
window.addEventListener('resize', () => {
  if(Math.abs(window.innerWidth - lastViewportW) < 8) return;
  lastViewportW = window.innerWidth;
  clearTimeout(resizeT);
  resizeT = setTimeout(() => {
    if(currentMode === 'presentation') renderPresentation();
  }, 200);
});

// ── MODE TOGGLE ───────────────────────────────────────────────
function setMode(mode){
  currentMode = mode;
  localStorage.setItem('fido_staff_mode_v1', mode);
  $('mode-presentation').classList.toggle('on', mode === 'presentation');
  $('mode-list').classList.toggle('on', mode === 'list');
  $('presentation').classList.toggle('active', mode === 'presentation');
  $('list').classList.toggle('active', mode === 'list');
  if(mode === 'presentation'){
    startAutoplay();
  }else{
    stopAutoplay();
  }
}
$('mode-presentation').addEventListener('click', () => setMode('presentation'));
$('mode-list').addEventListener('click', () => setMode('list'));
// Init mode from localStorage
setMode(currentMode);

// ── LIVE LISTENER ─────────────────────────────────────────────
function startListener(){
  const apptCol = collection(db,'locations',LOCATION_ID,'appointments');
  // Real schema uses endDate. Listen to all appointments where endDate >= today.
  const q = query(apptCol, where('endDate','>=',Timestamp.fromDate(startOfToday())));

  return onSnapshot(q,
    snap => {
      currentAppointments = snap.docs.map(d => ({id:d.id,...d.data()}));
      render();
    },
    err => {
      console.error('Snapshot error',err);
      $('err').textContent = 'Connection error: '+(err.message||err.code||'unknown');
      $('err').classList.add('show');
    }
  );
}
startListener();

// ── HIDE SPLASH ───────────────────────────────────────────────
setTimeout(()=>{
  $('splash').classList.add('hide');
  setTimeout(()=>{$('splash').remove()}, 600);
}, 2800);
</script>
