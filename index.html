<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dogs Currently Staying</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(8px);
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    #store-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    #dog-counter {
      font-size: 15px;
      color: rgba(255,255,255,0.55);
    }

    #clock {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      min-width: 80px;
      text-align: right;
    }

    /* ── Slide area ── */
    #slideshow {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.9s ease;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Blurred background photo */
    .slide-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(18px) brightness(0.35);
      transform: scale(1.08);
    }

    /* Card */
    .card {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 48px 56px 40px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      backdrop-filter: blur(12px);
      max-width: 480px;
      width: 90vw;
      text-align: center;
    }

    .dog-photo {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255,255,255,0.2);
      background: #1e2531;
    }

    .dog-photo-placeholder {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: #1e2531;
      border: 4px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
    }

    .dog-name {
      font-size: 38px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.5px;
    }

    .dog-breed {
      font-size: 18px;
      color: rgba(255,255,255,0.65);
      margin-top: -12px;
    }

    .badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      font-size: 13px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 100px;
      letter-spacing: 0.3px;
    }

    .badge-type {
      background: rgba(99,153,34,0.25);
      color: #a8d96a;
      border: 1px solid rgba(99,153,34,0.4);
    }

    .badge-checkout {
      background: rgba(239,159,39,0.18);
      color: #f5c97a;
      border: 1px solid rgba(239,159,39,0.35);
    }

    .badge-boarding {
      background: rgba(83,74,183,0.25);
      color: #b0aaee;
      border: 1px solid rgba(83,74,183,0.4);
    }

    /* ── Dot nav ── */
    #dots {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* ── Arrow nav ── */
    .arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 22px;
      width: 48px; height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .arrow:hover { background: rgba(255,255,255,0.2); }
    #prev { left: 20px; }
    #next { right: 20px; }

    /* ── Empty state ── */
    #empty {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }
    #empty .paw { font-size: 64px; }
    #empty h2 { font-size: 26px; font-weight: 600; }
    #empty p { color: rgba(255,255,255,0.5); font-size: 16px; }

    /* ── Loading ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Progress bar ── */
    #progress-bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 3px;
      background: rgba(255,255,255,0.5);
      transition: width linear;
      z-index: 20;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
  CONFIGURATION — edit these lines before uploading
════════════════════════════════════════════════ -->
<script>
  const CONFIG = {
    // Paste your Google Apps Script Web App URL here:
    SHEET_API_URL: "https://script.google.com/macros/s/AKfycbxTlrG2sN5hplMSl-fVycYg793Jyv_Eht4LlvoU64z8k0-tzWlwqWJEv_wpsjU3ZC1a/exec",

    // Your store name shown in the header:
    STORE_NAME: "🐾 Fido Playhouse - Williamsburg",

    // Seconds each dog is shown before auto-advancing:
    SLIDE_DURATION: 60,

    // How often to refresh data from Google Sheets (in minutes):
    REFRESH_INTERVAL: 5,

    // Column mapping — change if your sheet columns are in a different order
    // (0 = first column, 1 = second column, etc.)
    COLUMNS: {
      name:     0,   // Dog name
      photo:    1,   // Photo URL
      breed:    2,   // Breed
      type:     3,   // Type of reservation
      checkout: 4,   // Date of checkout
      id:       5    // ID
    }
  };
</script>
<!-- ═══════════════════════════════════════════════ -->

<div id="header">
  <div id="store-name"></div>
  <div id="dog-counter"></div>
  <div id="clock"></div>
</div>

<div id="slideshow">
  <div id="loading">
    <div class="spinner"></div>
    <p style="color:rgba(255,255,255,0.5);font-size:15px;">Loading today's guests…</p>
  </div>
  <div id="empty">
    <div class="paw">🐾</div>
    <h2>No dogs checked in right now</h2>
    <p>New arrivals will appear here automatically</p>
  </div>
</div>

<div id="dots"></div>
<button class="arrow" id="prev">&#8249;</button>
<button class="arrow" id="next">&#8250;</button>
<div id="progress-bar"></div>

<script>
  let dogs = [];
  let current = 0;
  let timer = null;
  let progressTimer = null;

  // ── Header ──────────────────────────────────────
  document.getElementById('store-name').textContent = CONFIG.STORE_NAME;

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 30000);

  // ── Fetch data ───────────────────────────────────
  async function fetchDogs() {
    try {
      const res = await fetch(CONFIG.SHEET_API_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      return data;
    } catch (e) {
      console.error('Failed to fetch dog data:', e);
      return null;
    }
  }

  // ── Filter: checked in today OR still boarding ───
  function filterActiveDogs(data) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    return data.filter(row => {
      const checkoutVal = row[CONFIG.COLUMNS.checkout];
      if (!checkoutVal) return true; // no checkout = still boarding
      const checkout = new Date(checkoutVal);
      checkout.setHours(0, 0, 0, 0);
      return checkout >= today;
    });
  }

  function parsedog(row) {
    return {
      name:     row[CONFIG.COLUMNS.name]     || 'Unknown',
      photo:    row[CONFIG.COLUMNS.photo]    || '',
      breed:    row[CONFIG.COLUMNS.breed]    || '',
      type:     row[CONFIG.COLUMNS.type]     || '',
      checkout: row[CONFIG.COLUMNS.checkout] || '',
      id:       row[CONFIG.COLUMNS.id]       || ''
    };
  }

  // ── Build slides ─────────────────────────────────
  function buildSlides(dogList) {
    const slideshow = document.getElementById('slideshow');
    const dots = document.getElementById('dots');
    slideshow.innerHTML = '';
    dots.innerHTML = '';

    if (dogList.length === 0) {
      const empty = document.createElement('div');
      empty.id = 'empty';
      empty.innerHTML = `
        <div class="paw">🐾</div>
        <h2>No dogs checked in right now</h2>
        <p>New arrivals will appear here automatically</p>
      `;
      empty.style.display = 'flex';
      slideshow.appendChild(empty);
      document.getElementById('prev').style.display = 'none';
      document.getElementById('next').style.display = 'none';
      document.getElementById('dog-counter').textContent = '';
      return;
    }

    document.getElementById('prev').style.display = '';
    document.getElementById('next').style.display = '';
    document.getElementById('dog-counter').textContent =
      dogList.length + (dogList.length === 1 ? ' guest' : ' guests') + ' today';

    dogList.forEach((dog, i) => {
      // Slide
      const slide = document.createElement('div');
      slide.className = 'slide' + (i === 0 ? ' active' : '');

      const isBoarding = !dog.checkout ||
        (() => {
          const c = new Date(dog.checkout);
          const t = new Date(); t.setHours(0,0,0,0);
          c.setHours(0,0,0,0);
          return c > t;
        })();

      const checkoutLabel = dog.checkout
        ? 'Checkout: ' + new Date(dog.checkout).toLocaleDateString([], { month: 'short', day: 'numeric' })
        : 'Still Boarding';

      const photoHtml = dog.photo
        ? `<img class="dog-photo" src="${dog.photo}" alt="${dog.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
           <div class="dog-photo-placeholder" style="display:none">🐶</div>`
        : `<div class="dog-photo-placeholder">🐶</div>`;

      slide.innerHTML = `
        <div class="slide-bg" style="background-image:url('${dog.photo || ''}')"></div>
        <div class="card">
          ${photoHtml}
          <div class="dog-name">${dog.name}</div>
          <div class="dog-breed">${dog.breed}</div>
          <div class="badges">
            ${dog.type ? `<span class="badge badge-type">${dog.type}</span>` : ''}
            <span class="badge ${isBoarding ? 'badge-boarding' : 'badge-checkout'}">${checkoutLabel}</span>
          </div>
        </div>
      `;
      slideshow.appendChild(slide);

      // Dot
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dots.appendChild(dot);
    });
  }

  // ── Navigation ───────────────────────────────────
  function goTo(index) {
    if (dogs.length === 0) return;
    const slides = document.querySelectorAll('.slide');
    const dotEls = document.querySelectorAll('.dot');
    slides[current]?.classList.remove('active');
    dotEls[current]?.classList.remove('active');
    current = (index + dogs.length) % dogs.length;
    slides[current]?.classList.add('active');
    dotEls[current]?.classList.add('active');
    resetTimer();
  }

  function resetTimer() {
    clearInterval(timer);
    clearInterval(progressTimer);

    const bar = document.getElementById('progress-bar');
    bar.style.transition = 'none';
    bar.style.width = '0%';

    requestAnimationFrame(() => {
      bar.style.transition = `width ${CONFIG.SLIDE_DURATION}s linear`;
      bar.style.width = '100%';
    });

    timer = setInterval(() => goTo(current + 1), CONFIG.SLIDE_DURATION * 1000);
  }

  document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('next').addEventListener('click', () => goTo(current + 1));

  // Keyboard nav
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  // ── Main load ────────────────────────────────────
  async function loadAndRender() {
    const raw = await fetchDogs();
    if (!raw) {
      console.warn('Could not load data, will retry');
      return;
    }

    // raw is array of arrays from Apps Script
    let filtered;
    const rows = Array.isArray(raw[0]) ? raw : [raw];
    filtered = rows.filter(row => {
      const checkoutVal = row[CONFIG.COLUMNS.checkout];
      if (!checkoutVal) return true;
      const checkout = new Date(checkoutVal);
      const today = new Date();
      // Compare just the date portion in local time
      return checkout.getFullYear() >= today.getFullYear() &&
             checkout.getMonth() >= today.getMonth() &&
             checkout.getDate() >= today.getDate();
    }).map(parsedog);

    const wasEmpty = dogs.length === 0;
    dogs = filtered;
    buildSlides(dogs);

    if (dogs.length > 0) {
      current = 0;
      resetTimer();
    }
  }

  // Initial load
  loadAndRender();

  // Auto-refresh
  setInterval(loadAndRender, CONFIG.REFRESH_INTERVAL * 60 * 1000);
</script>
</body>
</html>
