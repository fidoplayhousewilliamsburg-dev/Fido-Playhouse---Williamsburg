<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fido Playhouse - Williamsburg</title>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blue-primary:   #4C82A8;
      --blue-light:     #AFCDD7;
      --blue-dark:      #2E5665;
      --blue-deep:      #1a3d4f;
      --off-white:      #F6F7F0;
      --orange:         #D76B00;
      --orange-dark:    #BE4D00;
      --text-on-dark:   #F6F7F0;
      --text-muted:     rgba(246,247,240,0.55);
      --border:         rgba(175,205,215,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--blue-deep);
      font-family: 'Lato', sans-serif;
      color: var(--text-on-dark);
      height: 100vh;
      overflow: hidden;
    }

    /* ── NAV ── */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
      background: rgba(26,61,79,0.98);
      border-bottom: 1px solid var(--border);
      z-index: 200;
    }

    #store-name {
      font-family: 'Righteous', sans-serif;
      font-size: 17px;
      letter-spacing: 1px;
      color: var(--off-white);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--orange);
    }

    .brand-sub {
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 2.5px;
      color: var(--blue-light);
      text-transform: uppercase;
      margin-left: 2px;
    }

    #tab-buttons {
      display: flex;
      background: rgba(44,86,101,0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      gap: 4px;
    }

    .tab-btn {
      padding: 7px 20px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .tab-btn.active {
      background: var(--blue-primary);
      color: var(--off-white);
    }

    .tab-btn:hover:not(.active) { color: var(--off-white); }

    #clock {
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: var(--blue-light);
      letter-spacing: 1px;
      min-width: 72px;
      text-align: right;
    }

    /* ── PAGES ── */
    .page {
      position: fixed;
      inset: 62px 0 0 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .page.active { opacity: 1; pointer-events: auto; }

    /* ══════════════════════════
       DOGS SLIDESHOW
    ══════════════════════════ */
    #page-dogs { overflow: hidden; }

    #slideshow {
      width: 100%; height: 100%;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .slide {
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 1s ease;
      pointer-events: none;
    }
    .slide.active { opacity: 1; pointer-events: auto; }

    /* Full bleed photo */
    .slide-photo {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
    }

    /* Brand-blue gradient overlay */
    .slide-photo::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(26,61,79,0.15) 0%,
        rgba(26,61,79,0.0) 35%,
        rgba(26,61,79,0.0) 45%,
        rgba(26,61,79,0.65) 70%,
        rgba(26,61,79,0.97) 100%
      );
    }

    /* Info overlay bottom */
    .slide-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 52px 52px;
      z-index: 2;
    }

    .slide-name {
      font-family: 'Righteous', sans-serif;
      font-size: 68px;
      line-height: 1;
      letter-spacing: -1px;
      color: var(--off-white);
      margin-bottom: 8px;
      text-shadow: 0 2px 24px rgba(26,61,79,0.6);
    }

    .slide-breed {
      font-family: 'Lato', sans-serif;
      font-size: 19px;
      font-weight: 300;
      color: var(--blue-light);
      letter-spacing: 1px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .slide-badges { display: flex; gap: 10px; flex-wrap: wrap; }

    .badge {
      font-family: 'Lato', sans-serif;
      font-size: 11px;
      font-weight: 700;
      padding: 7px 18px;
      border-radius: 100px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .badge-type {
      background: rgba(76,130,168,0.3);
      color: var(--blue-light);
      border: 1px solid rgba(175,205,215,0.35);
    }

    .badge-checkout {
      background: rgba(215,107,0,0.2);
      color: #f0a060;
      border: 1px solid rgba(215,107,0,0.35);
    }

    .badge-boarding {
      background: rgba(175,205,215,0.15);
      color: var(--blue-light);
      border: 1px solid rgba(175,205,215,0.3);
    }

    /* Empty state */
    #empty-dogs {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      text-align: center;
      background: var(--blue-deep);
    }

    #empty-dogs .icon { font-size: 56px; margin-bottom: 8px; }

    #empty-dogs h2 {
      font-family: 'Righteous', sans-serif;
      font-size: 28px;
      color: var(--off-white);
    }

    #empty-dogs p {
      color: var(--text-muted);
      font-size: 16px;
      font-weight: 300;
    }

    /* Counter */
    #dog-counter {
      position: fixed;
      top: 74px; right: 20px;
      background: rgba(26,61,79,0.8);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 14px;
      font-family: 'Lato', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--blue-light);
      backdrop-filter: blur(10px);
      z-index: 150;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Dots */
    #dots {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 7px;
      z-index: 150;
    }

    .dot {
      height: 6px; border-radius: 3px;
      background: rgba(175,205,215,0.3);
      cursor: pointer;
      transition: all 0.3s;
      width: 6px;
    }

    .dot.active {
      background: var(--orange);
      width: 22px;
    }

    /* Arrows */
    .arrow {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      z-index: 150;
      background: rgba(26,61,79,0.7);
      border: 1px solid rgba(175,205,215,0.2);
      color: var(--blue-light);
      font-size: 22px;
      width: 46px; height: 46px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }

    .arrow:hover {
      background: var(--blue-primary);
      border-color: var(--blue-primary);
      color: var(--off-white);
    }

    #prev { left: 18px; }
    #next { right: 18px; }

    /* Progress bar */
    #progress-bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 3px;
      background: var(--orange);
      transition: width linear;
      z-index: 200;
    }

    /* Loading */
    #loading-dogs {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      background: var(--blue-deep);
    }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(175,205,215,0.2);
      border-top-color: var(--blue-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════
       GROOMING PAGE
    ══════════════════════════ */
    #page-grooming {
      overflow-y: auto;
      padding: 28px 36px;
      background: var(--blue-deep);
    }

    #grooming-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }

    #grooming-top h2 {
      font-family: 'Righteous', sans-serif;
      font-size: 22px;
      color: var(--off-white);
      letter-spacing: 0.5px;
    }

    #grooming-stats { display: flex; gap: 12px; flex-wrap: wrap; }

    .stat-card {
      background: rgba(76,130,168,0.15);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 22px;
      min-width: 110px;
    }

    .stat-label {
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: var(--blue-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'Righteous', sans-serif;
      font-size: 26px;
      color: var(--off-white);
    }

    .stat-value.blue { color: var(--blue-light); }
    .stat-value.orange { color: var(--orange); }

    /* Table */
    .gtable-wrap {
      background: rgba(44,86,101,0.35);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr { border-bottom: 1px solid var(--border); }

    th {
      text-align: left;
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: var(--blue-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 14px 20px;
    }

    td {
      padding: 15px 20px;
      font-family: 'Lato', sans-serif;
      font-size: 14px;
      border-bottom: 1px solid rgba(175,205,215,0.06);
      vertical-align: middle;
      color: var(--off-white);
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: rgba(76,130,168,0.1); }
    tbody tr.done td { opacity: 0.35; text-decoration: line-through; }
    tbody tr.done td:first-child { opacity: 1; text-decoration: none; }

    /* Mobile cards - hidden on desktop */
    .mobile-cards { display: none; }

    .dog-card {
      background: rgba(44,86,101,0.35);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .dog-card.done { opacity: 0.4; }

    .dog-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .dog-card-name {
      font-family: 'Righteous', sans-serif;
      font-size: 18px;
      color: var(--off-white);
    }

    .dog-card-breed {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .dog-card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-top: 1px solid rgba(175,205,215,0.06);
      font-size: 13px;
    }

    .dog-card-row-label {
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.8px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      #page-grooming { padding: 20px 16px; }

      #grooming-top { flex-direction: column; gap: 12px; }
      #grooming-top h2 { font-size: 18px; }

      #grooming-stats { width: 100%; justify-content: space-between; }
      .stat-card { flex: 1; min-width: 0; padding: 10px 12px; text-align: center; }
      .stat-value { font-size: 20px; }

      /* Hide table, show cards */
      .gtable-wrap { display: none !important; }
      .mobile-cards { display: block; }

      /* Slideshow adjustments */
      .slide-name { font-size: 42px; }
      .slide-breed { font-size: 15px; }
      .slide-info { padding: 0 24px 80px; }

      #nav { padding: 0 16px; }
      #store-name { font-size: 13px; }
      .brand-sub { display: none; }
      .tab-btn { padding: 7px 12px; font-size: 12px; }
      #clock { font-size: 12px; min-width: 56px; }

      .arrow { width: 36px; height: 36px; font-size: 18px; }
      #prev { left: 8px; }
      #next { right: 8px; }
    }

    .check-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1.5px solid rgba(175,205,215,0.3);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: all 0.2s;
      color: transparent;
    }

    .check-btn.checked {
      background: var(--blue-primary);
      border-color: var(--blue-primary);
      color: var(--off-white);
    }

    .check-btn:hover:not(.checked) {
      border-color: var(--blue-primary);
      color: var(--blue-primary);
    }

    .val { color: var(--orange); font-weight: 700; }
    .muted { color: var(--text-muted); }
    .dog-name-cell { font-weight: 700; }

    .time-pill {
      display: inline-block;
      background: rgba(76,130,168,0.2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--blue-light);
      letter-spacing: 0.5px;
    }

    #empty-grooming {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-size: 15px;
      font-family: 'Lato', sans-serif;
    }

    #loading-grooming {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      gap: 12px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── SERVICES PANEL ── */
    #services-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,28,38,0.82);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }

    #services-overlay.open { display: flex; }

    #services-panel {
      background: var(--blue-dark);
      border: 1px solid rgba(175,205,215,0.25);
      border-radius: 20px;
      padding: 28px;
      width: 90%;
      max-width: 420px;
    }

    #services-panel-title {
      font-family: 'Righteous', sans-serif;
      font-size: 20px;
      color: var(--off-white);
      margin-bottom: 4px;
    }

    #services-panel-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .service-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-radius: 10px;
      background: rgba(76,130,168,0.12);
      border: 1px solid rgba(175,205,215,0.1);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .service-item:hover { background: rgba(76,130,168,0.25); border-color: rgba(175,205,215,0.25); }

    .service-item.selected {
      background: rgba(76,130,168,0.35);
      border-color: var(--blue-primary);
    }

    .service-item-left { display: flex; align-items: center; gap: 12px; }

    .service-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid rgba(175,205,215,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      color: transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .service-item.selected .service-check {
      background: var(--blue-primary);
      border-color: var(--blue-primary);
      color: white;
    }

    .service-name {
      font-family: 'Lato', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--off-white);
    }

    .service-price {
      font-family: 'Righteous', sans-serif;
      font-size: 15px;
      color: var(--orange);
    }

    .service-distance-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 100px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-left: 6px;
    }

    .badge-long { background: rgba(215,107,0,0.2); color: #f0a060; border: 1px solid rgba(215,107,0,0.3); }
    .badge-short { background: rgba(76,175,125,0.2); color: #7FD4A8; border: 1px solid rgba(76,175,125,0.3); }

    #services-selected-list {
      min-height: 32px;
      margin: 16px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .selected-tag {
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 100px;
      background: rgba(76,130,168,0.25);
      color: var(--blue-light);
      border: 1px solid rgba(175,205,215,0.2);
    }

    #services-panel-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(175,205,215,0.2);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Lato', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel:hover { background: rgba(255,255,255,0.05); color: var(--off-white); }

    .btn-confirm {
      flex: 2;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: var(--blue-primary);
      color: var(--off-white);
      font-family: 'Righteous', sans-serif;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    .btn-confirm:hover { background: #5a92b8; }

    /* + button on slide */
    .slide-add-btn {
      position: absolute;
      top: 80px;
      right: 24px;
      z-index: 5;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(76,130,168,0.35);
      border: 1.5px solid rgba(175,205,215,0.3);
      color: var(--off-white);
      font-size: 24px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(6px);
    }

    .slide-add-btn:hover { background: var(--blue-primary); border-color: var(--blue-primary); }

    /* Active services tags on slide */
    .slide-extra-services {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .extra-tag {
      font-size: 11px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 100px;
      background: rgba(215,107,0,0.25);
      color: #f0a060;
      border: 1px solid rgba(215,107,0,0.35);
      letter-spacing: 0.3px;
    }

    /* Walking distance loading */
    #distance-loading {
      text-align: center;
      padding: 12px;
      color: var(--text-muted);
      font-size: 13px;
    }
</head>
<body>

<script>
  const CONFIG = {
    SHEET_API_URL: "https://script.google.com/macros/s/AKfycbzD_dT7oNYz8kto7YXCzTliNkIRpOMGPSyfakpC0H76qNfEVr90fFGPohxY2Vw3nx04/exec",
    SLIDE_DURATION: 7,
    REFRESH_INTERVAL: 0.5,
    STORE_ADDRESS: "420 Kent Ave, Brooklyn, NY 11249",
    COLUMNS: { name: 0, photo: 1, breed: 2, type: 3, checkout: 4, id: 5, address: 6, apt: 7, owner: 8 }
  };
</script>

<!-- NAV -->
<div id="nav">
  <div id="store-name">
    <div class="brand-dot"></div>
    <div>
      <span>FIDO PLAYHOUSE</span>
      <div class="brand-sub">Williamsburg</div>
    </div>
  </div>
  <div id="tab-buttons">
    <button class="tab-btn active" onclick="switchTab('dogs')">🐶 Dogs Today</button>
    <button class="tab-btn" onclick="switchTab('grooming')">✂️ Grooming</button>
  </div>
  <div id="clock"></div>
</div>

<div id="dog-counter"></div>

<!-- DOGS PAGE -->
<div id="page-dogs" class="page active">
  <div id="slideshow">
    <div id="loading-dogs">
      <div class="spinner"></div>
      <p style="color:var(--text-muted);font-size:14px;font-family:'Lato',sans-serif;letter-spacing:1px;">Loading today's guests…</p>
    </div>
    <div id="empty-dogs">
      <div class="icon">🐾</div>
      <h2>No guests right now</h2>
      <p>New check-ins will appear automatically</p>
    </div>
  </div>
</div>

<!-- GROOMING PAGE -->
<div id="page-grooming" class="page">
  <div id="grooming-top">
    <h2>✂️ GROOMING & BATH</h2>
    <div id="grooming-stats">
      <div class="stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Done</div>
        <div class="stat-value blue" id="stat-done">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Groomer 60%</div>
        <div class="stat-value orange" id="stat-cut">—</div>
      </div>
    </div>
  </div>

  <div id="loading-grooming"><div class="spinner"></div><p>Loading…</p></div>

  <div class="gtable-wrap" id="gtable-wrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>Done</th><th>Name</th><th>Breed</th><th>Service</th><th>Details</th><th>Time</th><th>Value</th>
        </tr>
      </thead>
      <tbody id="grooming-tbody"></tbody>
    </table>
  </div>

  <div class="mobile-cards" id="mobile-cards"></div>

  <div id="empty-grooming" style="display:none">No dogs in the grooming list</div>
</div>

<div id="dots"></div>
<button class="arrow" id="prev">&#8249;</button>
<button class="arrow" id="next">&#8250;</button>
<div id="progress-bar"></div>

<!-- Services Panel -->
<div id="services-overlay">
  <div id="services-panel">
    <div id="services-panel-title">Add Services</div>
    <div id="services-panel-sub"></div>
    <div id="distance-loading" style="display:none">⏳ Checking distance…</div>
    <div id="services-list"></div>
    <div id="services-selected-list"></div>
    <div id="services-panel-actions">
      <button class="btn-cancel" onclick="closeServices()">Cancel</button>
      <button class="btn-confirm" onclick="confirmServices()">Confirm</button>
    </div>
  </div>
</div>

<script>
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 30000);

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'dogs') || (i === 1 && tab === 'grooming'));
    });
    document.getElementById('page-dogs').classList.toggle('active', tab === 'dogs');
    document.getElementById('page-grooming').classList.toggle('active', tab === 'grooming');
    ['dots','prev','next','progress-bar','dog-counter'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = tab === 'dogs' ? '' : 'none';
    });
    if (tab === 'grooming') loadGrooming();
  }

  // ══ DOGS ══════════════════════════════
  let dogs = [], current = 0, timer = null;

  function parseValue(val) {
    if (!val) return 0;
    return parseFloat(String(val).replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
  }

  function formatTime(val) {
    if (!val) return '—';
    const d = new Date(val);
    if (!isNaN(d)) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
    return String(val);
  }

  async function fetchDogs() {
    try {
      const res = await fetch(CONFIG.SHEET_API_URL + '?t=' + Date.now());
      return await res.json();
    } catch(e) { return null; }
  }

  function parsedog(row) {
    return {
      name:     String(row[CONFIG.COLUMNS.name]     || 'Unknown'),
      photo:    String(row[CONFIG.COLUMNS.photo]    || ''),
      breed:    String(row[CONFIG.COLUMNS.breed]    || ''),
      type:     String(row[CONFIG.COLUMNS.type]     || ''),
      checkout: row[CONFIG.COLUMNS.checkout]        || '',
      id:       row[CONFIG.COLUMNS.id]              || '',
      address:  String(row[CONFIG.COLUMNS.address]  || ''),
      apt:      String(row[CONFIG.COLUMNS.apt]      || ''),
      owner:    String(row[CONFIG.COLUMNS.owner]    || ''),
      extras:   []  // visual-only added services
    };
  }

  // Preload images silently so slides feel instant
  function preloadImages(dogList) {
    dogList.forEach(dog => {
      if (dog.photo) {
        const img = new Image();
        img.src = dog.photo;
      }
    });
  }

  function buildSlides(dogList) {
    const slideshow = document.getElementById('slideshow');
    const dots = document.getElementById('dots');
    document.getElementById('loading-dogs').style.display = 'none';
    document.querySelectorAll('.slide').forEach(s => s.remove());
    dots.innerHTML = '';

    if (dogList.length === 0) {
      document.getElementById('empty-dogs').style.display = 'flex';
      document.getElementById('prev').style.display = 'none';
      document.getElementById('next').style.display = 'none';
      document.getElementById('dog-counter').textContent = '';
      return;
    }

    document.getElementById('empty-dogs').style.display = 'none';
    document.getElementById('prev').style.display = '';
    document.getElementById('next').style.display = '';
    document.getElementById('dog-counter').textContent =
      dogList.length + (dogList.length === 1 ? ' GUEST TODAY' : ' GUESTS TODAY');

    dogList.forEach((dog, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide' + (i === 0 ? ' active' : '');

      const isBoarding = !dog.checkout || (() => {
        const c = new Date(dog.checkout), t = new Date();
        t.setHours(0,0,0,0); c.setHours(0,0,0,0); return c > t;
      })();

      const checkoutLabel = dog.checkout
        ? 'Checkout ' + new Date(dog.checkout).toLocaleDateString([], { month: 'short', day: 'numeric' })
        : 'Still Boarding';

      const bgStyle = dog.photo
        ? `background-image: url('${dog.photo}')`
        : `background: linear-gradient(135deg, var(--blue-dark), var(--blue-deep))`;

      slide.innerHTML = `
        <div class="slide-photo" style="${bgStyle}"></div>
        <button class="slide-add-btn" onclick="openServices(${i})" title="Add services">+</button>
        <div class="slide-info">
          <div class="slide-name">${dog.name}</div>
          <div class="slide-breed">${dog.breed}</div>
          <div class="slide-badges">
            ${dog.type ? `<span class="badge badge-type">${dog.type}</span>` : ''}
            <span class="badge ${isBoarding ? 'badge-boarding' : 'badge-checkout'}">${checkoutLabel}</span>
          </div>
          <div class="slide-extra-services" id="extras-${i}"></div>
        </div>`;
      slideshow.appendChild(slide);

      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dots.appendChild(dot);
    });
  }

  function goTo(index) {
    if (dogs.length === 0) return;
    const slides = document.querySelectorAll('.slide');
    const dotEls = document.querySelectorAll('.dot');
    slides[current]?.classList.remove('active');
    dotEls[current]?.classList.remove('active');
    current = (index + dogs.length) % dogs.length;
    slides[current]?.classList.add('active');
    dotEls[current]?.classList.add('active');
    resetTimer();
  }

  function resetTimer() {
    clearInterval(timer);
    const bar = document.getElementById('progress-bar');
    bar.style.transition = 'none'; bar.style.width = '0%';
    requestAnimationFrame(() => {
      bar.style.transition = `width ${CONFIG.SLIDE_DURATION}s linear`;
      bar.style.width = '100%';
    });
    timer = setInterval(() => goTo(current + 1), CONFIG.SLIDE_DURATION * 1000);
  }

  document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
  document.getElementById('next').addEventListener('click', () => goTo(current + 1));
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  let lastDataSignature = '';

  async function loadAndRender() {
    const raw = await fetchDogs();
    if (!raw) return;
    const rows = Array.isArray(raw[0]) ? raw : [raw];
    const filtered = rows.filter(row => {
      if (!row[CONFIG.COLUMNS.name] || String(row[CONFIG.COLUMNS.name]).trim() === '') return false;
      const checkoutVal = row[CONFIG.COLUMNS.checkout];
      if (!checkoutVal) return true;
      const checkout = new Date(checkoutVal);
      const today = new Date();
      return checkout.getFullYear() >= today.getFullYear() &&
             checkout.getMonth() >= today.getMonth() &&
             checkout.getDate() >= today.getDate();
    }).map(parsedog);

    // Create a signature of the current data to detect changes
    const newSignature = filtered.map(d => d.name + d.id).join('|');

    // Only rebuild slides if data actually changed
    if (newSignature === lastDataSignature) return;
    lastDataSignature = newSignature;

    // Remember current dog name before rebuilding
    const currentDogName = dogs[current]?.name || '';

    dogs = filtered;
    preloadImages(dogs);
    buildSlides(dogs);

    if (dogs.length > 0) {
      // Try to resume from the same dog
      const resumeIndex = dogs.findIndex(d => d.name === currentDogName);
      current = resumeIndex >= 0 ? resumeIndex : 0;

      // Activate the correct slide
      document.querySelectorAll('.slide').forEach((s, i) => {
        s.classList.toggle('active', i === current);
      });
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });

      resetTimer();
    }
  }

  loadAndRender();
  setInterval(loadAndRender, CONFIG.REFRESH_INTERVAL * 60 * 1000);

  // ══ SERVICES PANEL ══════════════════════
  const ALL_SERVICES = [
    { id: 'dropoff_short', name: 'Drop off (Short)', price: 10, type: 'dropoff' },
    { id: 'dropoff_long',  name: 'Drop off (Long)',  price: 16, type: 'dropoff' },
    { id: 'pickup_short',  name: 'Pick up (Short)',  price: 10, type: 'pickup'  },
    { id: 'pickup_long',   name: 'Pick up (Long)',   price: 16, type: 'pickup'  },
    { id: 'holiday',       name: 'Holiday Fee',      price: 40, type: 'other'   },
    { id: 'food',          name: 'House Food',       price: 4,  type: 'other'   },
    { id: 'nail',          name: 'Nail Trimming',    price: 15, type: 'other'   },
    { id: 'other',         name: 'Other Services',   price: 0,  type: 'other'   },
  ];

  let servicePanelDogIndex = -1;
  let selectedServices = [];
  let isLongDistance = null;
  let slideWasPaused = false;

  async function checkWalkingDistance(address, apt) {
    if (!address || address.trim() === '') return null;
    try {
      const fullAddress = address + (apt ? ', ' + apt : '') + ', Brooklyn, NY';
      const origin = encodeURIComponent(CONFIG.STORE_ADDRESS);
      const dest = encodeURIComponent(fullAddress);
      const url = `https://maps.googleapis.com/maps/api/distancematrix/json?origins=${origin}&destinations=${dest}&mode=walking&key=`;
      // Use nominatim (free) to get coords, then calculate straight-line approximation
      // ~10 min walking = ~800 meters at average 80m/min
      const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?q=${dest}&format=json&limit=1`);
      const geoData = await geoRes.json();
      if (!geoData.length) return null;
      const destLat = parseFloat(geoData[0].lat);
      const destLon = parseFloat(geoData[0].lon);
      // Store coords: 420 Kent Ave, Williamsburg
      const storeLat = 40.7133;
      const storeLon = -73.9630;
      // Haversine distance in meters
      const R = 6371000;
      const dLat = (destLat - storeLat) * Math.PI / 180;
      const dLon = (destLon - storeLon) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(storeLat * Math.PI/180) * Math.cos(destLat * Math.PI/180) * Math.sin(dLon/2)**2;
      const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      // 10 min walking ≈ 800m
      return dist > 800;
    } catch(e) {
      return null;
    }
  }

  async function openServices(dogIndex) {
    servicePanelDogIndex = dogIndex;
    const dog = dogs[dogIndex];
    selectedServices = [...(dog.extras || [])];

    // Pause slideshow
    clearInterval(timer);
    const bar = document.getElementById('progress-bar');
    bar.style.transition = 'none';
    bar.style.width = bar.style.width;
    slideWasPaused = true;

    // Setup panel
    document.getElementById('services-panel-title').textContent = `Add Services — ${dog.name}`;
    document.getElementById('services-panel-sub').textContent = dog.owner ? `Owner: ${dog.owner}` : '';
    document.getElementById('services-overlay').classList.add('open');

    // Check distance
    isLongDistance = null;
    if (dog.address) {
      document.getElementById('distance-loading').style.display = 'block';
      document.getElementById('services-list').innerHTML = '';
      isLongDistance = await checkWalkingDistance(dog.address, dog.apt);
      document.getElementById('distance-loading').style.display = 'none';
    }

    renderServicesList();
  }

  function renderServicesList() {
    const list = document.getElementById('services-list');
    list.innerHTML = '';

    ALL_SERVICES.forEach(svc => {
      // Filter drop off / pick up based on distance
      if (svc.type === 'dropoff' || svc.type === 'pickup') {
        if (isLongDistance === true  && svc.id.endsWith('_short')) return;
        if (isLongDistance === false && svc.id.endsWith('_long'))  return;
      }

      const isSelected = selectedServices.some(s => s.id === svc.id);
      const isLong = svc.id.endsWith('_long');
      const isShort = svc.id.endsWith('_short');

      const distBadge = isLong ? `<span class="service-distance-badge badge-long">+10 min</span>` :
                        isShort ? `<span class="service-distance-badge badge-short">-10 min</span>` : '';

      const priceLabel = svc.price > 0 ? `$${svc.price}` : 'Custom';

      const item = document.createElement('div');
      item.className = 'service-item' + (isSelected ? ' selected' : '');
      item.innerHTML = `
        <div class="service-item-left">
          <div class="service-check">✓</div>
          <span class="service-name">${svc.name}${distBadge}</span>
        </div>
        <span class="service-price">${priceLabel}</span>`;

      item.addEventListener('click', () => {
        const idx = selectedServices.findIndex(s => s.id === svc.id);
        if (idx >= 0) {
          selectedServices.splice(idx, 1);
        } else {
          selectedServices.push(svc);
        }
        renderServicesList();
        renderSelectedTags();
      });

      list.appendChild(item);
    });

    renderSelectedTags();
  }

  function renderSelectedTags() {
    const container = document.getElementById('services-selected-list');
    container.innerHTML = '';
    selectedServices.forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'selected-tag';
      tag.textContent = s.price > 0 ? `${s.name} $${s.price}` : s.name;
      container.appendChild(tag);
    });
  }

  function confirmServices() {
    if (servicePanelDogIndex >= 0) {
      dogs[servicePanelDogIndex].extras = [...selectedServices];
      // Update the extras display on the slide
      const extrasEl = document.getElementById('extras-' + servicePanelDogIndex);
      if (extrasEl) {
        extrasEl.innerHTML = dogs[servicePanelDogIndex].extras
          .map(s => `<span class="extra-tag">${s.name}${s.price > 0 ? ' $' + s.price : ''}</span>`)
          .join('');
      }
    }
    closeServices();
  }

  function closeServices() {
    document.getElementById('services-overlay').classList.remove('open');
    servicePanelDogIndex = -1;
    if (slideWasPaused) {
      resetTimer();
      slideWasPaused = false;
    }
  }

  // Close panel on overlay click
  document.getElementById('services-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeServices();
  });
  let groomingData = [];

  async function loadGrooming() {
    document.getElementById('loading-grooming').style.display = 'flex';
    document.getElementById('gtable-wrap').style.display = 'none';
    document.getElementById('empty-grooming').style.display = 'none';
    try {
      const res = await fetch(CONFIG.SHEET_API_URL + '?action=grooming&t=' + Date.now());
      groomingData = await res.json();
    } catch(e) { groomingData = []; }
    document.getElementById('loading-grooming').style.display = 'none';
    renderGrooming();
  }

  function renderGrooming() {
    const tbody = document.getElementById('grooming-tbody');
    const mobileCards = document.getElementById('mobile-cards');
    tbody.innerHTML = '';
    mobileCards.innerHTML = '';

    if (!groomingData.length) {
      document.getElementById('empty-grooming').style.display = 'block';
      updateGroomingStats([]);
      return;
    }

    document.getElementById('gtable-wrap').style.display = 'block';

    groomingData.forEach(dog => {
      const value = parseValue(dog.value);
      const timeStr = formatTime(dog.time);

      // ── Desktop table row ──
      const tr = document.createElement('tr');
      tr.className = dog.done ? 'done' : '';
      tr.innerHTML = `
        <td><button class="check-btn ${dog.done ? 'checked' : ''}" onclick="toggleDone(${dog.index}, ${!dog.done})">✓</button></td>
        <td class="dog-name-cell">${dog.name}</td>
        <td class="muted">${dog.breed || '—'}</td>
        <td>${dog.service || '—'}</td>
        <td class="muted" style="font-size:13px">${dog.details || '—'}</td>
        <td><span class="time-pill">${timeStr}</span></td>
        <td class="val">$${value.toFixed(2)}</td>`;
      tbody.appendChild(tr);

      // ── Mobile card ──
      const card = document.createElement('div');
      card.className = 'dog-card' + (dog.done ? ' done' : '');
      card.innerHTML = `
        <div class="dog-card-header">
          <div>
            <div class="dog-card-name">${dog.name}</div>
            <div class="dog-card-breed">${dog.breed || '—'}</div>
          </div>
          <button class="check-btn ${dog.done ? 'checked' : ''}" onclick="toggleDone(${dog.index}, ${!dog.done})">✓</button>
        </div>
        <div class="dog-card-row">
          <span class="dog-card-row-label">Service</span>
          <span>${dog.service || '—'}</span>
        </div>
        ${dog.details ? `<div class="dog-card-row">
          <span class="dog-card-row-label">Details</span>
          <span style="color:var(--text-muted)">${dog.details}</span>
        </div>` : ''}
        <div class="dog-card-row">
          <span class="dog-card-row-label">Time</span>
          <span class="time-pill">${timeStr}</span>
        </div>
        <div class="dog-card-row">
          <span class="dog-card-row-label">Value</span>
          <span class="val">$${value.toFixed(2)}</span>
        </div>`;
      mobileCards.appendChild(card);
    });

    updateGroomingStats(groomingData);
  }

  function updateGroomingStats(data) {
    const total = data.length;
    const done = data.filter(d => d.done).length;
    const totalVal = data.reduce((s, d) => s + parseValue(d.value), 0);
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent = done + '/' + total;
    document.getElementById('stat-cut').textContent = '$' + (totalVal * 0.6).toFixed(2);
  }

  async function toggleDone(rowIndex, newState) {
    const idx = groomingData.findIndex(d => d.index === rowIndex);
    if (idx === -1) return;
    groomingData[idx].done = newState;
    renderGrooming();
    try {
      await fetch(`${CONFIG.SHEET_API_URL}?action=updateGrooming&row=${rowIndex}&done=${newState}&t=${Date.now()}`);
    } catch(e) { console.error('Save failed:', e); }
  }
</script>
</body>
</html>
