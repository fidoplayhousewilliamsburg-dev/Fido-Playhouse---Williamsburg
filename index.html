<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Fido Playhouse — Williamsburg · Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Lato:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bp:#4C82A8;
  --bp-dark:#3D6E91;
  --bp-darker:#2E5665;
  --gold:#C9A96E;
  --gold-light:#D7BA81;
  --orange:#D76B00;
  --white:#FFF;
  --glass:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.18);
  --border-soft:rgba(255,255,255,.10);
  --muted:rgba(255,255,255,.68);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Lato',sans-serif;color:var(--white);background:#3D6E91}
img{display:block;max-width:100%}
.app{height:100vh;display:flex;flex-direction:column}

/* Splash */
#splash{
  position:fixed;inset:0;z-index:1000;
  background:linear-gradient(135deg, var(--bp-dark) 0%, var(--bp-darker) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;
  opacity:1;
  transition:opacity 400ms ease-out;
  pointer-events:none;
}
#splash.fade-out{opacity:0}
#splash.gone{display:none}
.splash-stack{display:flex;flex-direction:column;align-items:center;gap:18px}
.splash-logo{
  width:120px;height:120px;
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.35));
  animation:splash-breathe 2.4s ease-in-out infinite;
  will-change:transform;
}
.splash-logo img{width:100%;height:100%;object-fit:contain}
@keyframes splash-breathe{
  0%, 100% { transform: scale(1); opacity: .92 }
  50% { transform: scale(1.06); opacity: 1 }
}
.splash-text{display:flex;flex-direction:column;align-items:center;gap:6px}
.splash-brand{font-family:'Righteous',sans-serif;font-size:28px;letter-spacing:.5px;color:var(--white);text-align:center;line-height:1}
.splash-loc{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);font-weight:700;text-align:center}
.splash-loader{display:flex;align-items:center;gap:14px;margin-top:10px}
.splash-loader-text{font-size:11px;letter-spacing:2.4px;text-transform:uppercase;color:var(--muted);font-weight:700}
.orbit{position:relative;width:24px;height:24px;animation:orbit-spin 1.1s linear infinite;will-change:transform}
.orbit::before{content:'';position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(201,169,110,.18)}
.orbit-dot{position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px rgba(201,169,110,.7)}
.orbit-trail-1,.orbit-trail-2,.orbit-trail-3{position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--gold);pointer-events:none}
.orbit-trail-1{opacity:.55}
.orbit-trail-2{opacity:.30}
.orbit-trail-3{opacity:.14}
@keyframes orbit-spin{to{transform:rotate(360deg)}}
.orbit-trail-wrap{position:absolute;inset:0;animation:orbit-spin 1.1s linear infinite}
.orbit-trail-wrap.t1{animation-delay:-1.05s}
.orbit-trail-wrap.t2{animation-delay:-1s}
.orbit-trail-wrap.t3{animation-delay:-.95s}

.topbar{flex-shrink:0;padding:env(safe-area-inset-top) 24px 0;background:#2E5665;border-bottom:1px solid var(--border-soft);z-index:50}
.topbar-inner{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:14px;height:60px}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-mark img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.brand-text{display:flex;flex-direction:column;line-height:1.05}
.brand-name{font-family:'Righteous',sans-serif;font-size:14px;letter-spacing:.6px;color:var(--white)}
.brand-loc{font-size:9px;letter-spacing:2.2px;text-transform:uppercase;color:var(--gold-light);font-weight:700;margin-top:2px}
.live-pill{justify-self:center;display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:100px;background:var(--glass);border:1px solid var(--border);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;font-weight:700;color:var(--muted)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#5CD68A}

.mode-toggle{display:flex;background:var(--glass);border:1px solid var(--border);border-radius:100px;padding:3px;gap:2px}
.mode-btn{position:relative;padding:6px 14px;border-radius:100px;border:none;background:transparent;color:var(--muted);font-family:'Lato',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:5px}
.mode-btn svg{width:13px;height:13px}
.mode-btn.on{background:var(--gold);color:var(--bp-darker)}
.bday-indicator{width:6px;height:6px;border-radius:50%;background:var(--gold-light);box-shadow:0 0 0 0 rgba(215,186,129,.6);animation:bday-pulse 1.6s ease-in-out infinite;display:none}
.bday-indicator.show{display:inline-block}
.mode-btn.on .bday-indicator{background:var(--bp-darker)}
@keyframes bday-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(215,186,129,.6)}
  50%{box-shadow:0 0 0 5px rgba(215,186,129,0)}
}

.clock{display:flex;flex-direction:column;align-items:flex-end;line-height:1.05}
.clock-time{font-family:'Righteous',sans-serif;font-size:18px;letter-spacing:.5px;color:var(--white);font-variant-numeric:tabular-nums}
.clock-date{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:2px}

.main{flex:1;position:relative;overflow:hidden}

#display{position:absolute;inset:0;display:none}
#display.on{display:block}
.slide{position:absolute;inset:0;display:flex}
.slide-half{
  flex:1;height:100%;position:relative;overflow:hidden;
  border-right:1px solid rgba(255,255,255,.16);
  contain:layout paint;
  background:var(--bp-darker);
}
.slide-half:last-child{border-right:none}
.slide-photo{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;object-position:center 38%;z-index:1;
}
.slide-photo-bg{
  position:absolute;inset:-6%;width:112%;height:112%;
  object-fit:cover;filter:blur(12px) brightness(.55);z-index:0;
  transform:translateZ(0) scale(1.03);backface-visibility:hidden;
}
.bg-overlay{position:absolute;inset:0;z-index:2;background:linear-gradient(to bottom,rgba(46,86,101,0) 0%,rgba(46,86,101,0) 40%,rgba(46,86,101,.6) 70%,rgba(46,86,101,.97) 100%);pointer-events:none}
.bg-fallback{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bp-darker),var(--bp));font-family:'Righteous',sans-serif;font-size:clamp(60px,12vw,140px);color:rgba(201,169,110,.4);letter-spacing:4px}
.slide-info{position:absolute;left:0;right:0;bottom:0;z-index:3;padding:0 44px 56px;pointer-events:none}
.slide-name{font-family:'Righteous',sans-serif;font-size:clamp(40px,7vw,82px);line-height:.95;letter-spacing:-1px;color:var(--white);text-shadow:0 4px 18px rgba(0,0,0,.45);margin-bottom:8px}
.slide-breed{font-size:clamp(13px,1.5vw,18px);font-weight:700;letter-spacing:2.2px;text-transform:uppercase;color:var(--gold-light);margin-bottom:16px;text-shadow:0 2px 6px rgba(0,0,0,.4)}
.slide-badges{display:flex;gap:7px;flex-wrap:wrap}
.slide-badge{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:5px 12px;border-radius:100px;border:1px solid rgba(255,255,255,.4);background:rgba(46,86,101,.7);color:var(--white)}
.slide-badge.gold{background:rgba(201,169,110,.45);border-color:rgba(215,186,129,.7)}
.slide-badge.orange{background:rgba(215,107,0,.5);border-color:rgba(240,160,80,.65)}
.slide-half.bday{outline:4px solid var(--gold);outline-offset:-4px}
.bday-banner{position:absolute;top:20px;left:20px;z-index:6;background:var(--gold);color:var(--bp-darker);font-size:12px;font-weight:700;letter-spacing:.5px;padding:7px 14px;border-radius:100px;box-shadow:0 4px 12px rgba(0,0,0,.25)}

.counter{position:absolute;top:20px;right:20px;z-index:20;background:rgba(255,255,255,.92);color:var(--bp-darker);font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;padding:6px 14px;border-radius:100px}
.dots{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:20}
.dot{height:6px;width:6px;border-radius:100px;background:rgba(255,255,255,.35);cursor:pointer;border:none;padding:0}
.dot.on{background:var(--gold-light);width:22px}
.arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:20;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.92);border:none;color:var(--bp-darker);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.arrow svg{width:20px;height:20px}
.arrow.prev{left:16px}
.arrow.next{right:16px}
.progress{position:absolute;bottom:0;left:0;height:3px;background:var(--gold);z-index:25;width:0%}

#list{position:absolute;inset:0;display:none;overflow-y:auto;overscroll-behavior:contain}
#list.on{display:block}
.list-inner{padding:24px 24px 60px;max-width:1280px;margin:0 auto;width:100%}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.page-title{font-family:'Righteous',sans-serif;font-size:32px;letter-spacing:-.3px;color:var(--white);line-height:1}
.page-sub{font-size:11px;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold-light);font-weight:700;margin-top:6px}
.head-stats{display:flex;gap:8px;flex-wrap:wrap}
.stat-pill{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:8px 14px;display:flex;flex-direction:column;align-items:flex-start;gap:1px;min-width:80px}
.stat-pill-label{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);font-weight:700}
.stat-pill-value{font-family:'Righteous',sans-serif;font-size:20px;color:var(--white);letter-spacing:.4px;font-variant-numeric:tabular-nums}
.stat-pill-value.gold{color:var(--gold-light)}
.section{margin-bottom:28px;content-visibility:auto;contain-intrinsic-size:1px 280px}
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border-soft)}
.section-title{font-family:'Righteous',sans-serif;font-size:17px;color:var(--white);letter-spacing:.3px}
.section-count{font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:var(--bp-darker);font-weight:700;background:var(--gold);padding:3px 11px;border-radius:100px}
.section-icon{width:28px;height:28px;border-radius:8px;background:var(--glass);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--gold-light)}
.section-icon svg{width:15px;height:15px}
.dog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.dog-card{
  background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:16px;
  display:flex;align-items:center;gap:12px;position:relative;contain:layout paint;
  content-visibility:auto;contain-intrinsic-size:92px;
}
.dog-photo{width:58px;height:58px;border-radius:50%;flex-shrink:0;background-color:rgba(255,255,255,.08);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Righteous',sans-serif;font-size:18px;color:var(--gold-light);overflow:hidden;position:relative}
.dog-photo img{width:100%;height:100%;object-fit:cover}
.dog-info{flex:1;min-width:0}
.dog-name{font-family:'Righteous',sans-serif;font-size:17px;color:var(--white);letter-spacing:.2px;line-height:1.1;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dog-breed{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dog-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.badge{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:100px;border:1px solid var(--border);background:var(--glass);color:var(--muted)}
.badge.gold{background:rgba(201,169,110,.18);border-color:rgba(201,169,110,.4);color:var(--gold-light)}
.badge.checkout{background:rgba(215,107,0,.16);border-color:rgba(215,107,0,.4);color:#F0A050}
.badge.boarding{background:rgba(122,172,184,.18);border-color:rgba(122,172,184,.45);color:#A8D0DC}
.dog-bday{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px}

#birthday{position:absolute;inset:0;display:none;overflow-y:auto;overscroll-behavior:contain}
#birthday.on{display:block}
.bday-hero{
  position:absolute;inset:0;
  background:linear-gradient(135deg, var(--bp-darker) 0%, #1F3F4A 100%);
  overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;
}
.bday-hero-photo-frame{
  position:relative;
  width:min(38vh, 280px);height:min(38vh, 280px);
  border-radius:50%;
  border:5px solid var(--gold);
  overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 12px rgba(201,169,110,.12);
  margin-bottom:28px;
  animation:bday-float 4s ease-in-out infinite;
  will-change:transform;
  z-index:2;
}
.bday-hero-photo-frame img{width:100%;height:100%;object-fit:cover}
.bday-hero-photo-fallback{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--bp-dark),var(--bp));
  font-family:'Righteous',sans-serif;font-size:80px;color:var(--gold-light);
}
@keyframes bday-float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
.bday-hero-greeting{font-family:'Righteous',sans-serif;font-size:clamp(14px,2vw,20px);letter-spacing:4px;text-transform:uppercase;color:var(--gold-light);font-weight:400;margin-bottom:10px;text-align:center;z-index:2}
.bday-hero-name{font-family:'Righteous',sans-serif;font-size:clamp(48px,9vw,110px);line-height:.95;letter-spacing:-1px;color:var(--white);text-align:center;text-shadow:0 6px 24px rgba(0,0,0,.5);margin-bottom:14px;z-index:2}
.bday-hero-age{font-family:'Righteous',sans-serif;font-size:clamp(20px,3vw,32px);letter-spacing:.5px;color:var(--gold);margin-bottom:20px;text-align:center;z-index:2}
.bday-hero-breed{font-size:clamp(12px,1.4vw,16px);font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.6);text-align:center;z-index:2}

.confetti-piece{position:absolute;width:10px;height:14px;top:-20px;opacity:0;pointer-events:none;z-index:1;animation:confetti-fall linear infinite;will-change:transform,opacity}
@keyframes confetti-fall{
  0%{opacity:0;transform:translateY(0) rotate(0deg)}
  10%{opacity:1}
  90%{opacity:1}
  100%{opacity:0;transform:translateY(110vh) rotate(720deg)}
}

.bday-hero-dots{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:20}
.bday-hero-counter{position:absolute;top:24px;right:24px;z-index:20;background:rgba(255,255,255,.92);color:var(--bp-darker);font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;padding:6px 14px;border-radius:100px}

.bday-month{padding:32px 28px 60px;max-width:880px;margin:0 auto}
.bday-month-head{margin-bottom:28px}
.bday-month-title{font-family:'Righteous',sans-serif;font-size:32px;letter-spacing:-.3px;color:var(--white);line-height:1;display:flex;align-items:center;gap:14px}
.bday-month-sub{font-size:11px;letter-spacing:1.8px;text-transform:uppercase;color:var(--gold-light);font-weight:700;margin-top:8px}
.bday-month-empty{text-align:center;padding:60px 24px;color:var(--muted)}
.bday-month-empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.bday-month-list{display:flex;flex-direction:column;gap:10px}
.bday-month-row{
  background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:14px 18px;
  display:flex;align-items:center;gap:16px;contain:layout paint;
  content-visibility:auto;contain-intrinsic-size:78px;
}
.bday-month-row.today{background:rgba(201,169,110,.18);border-color:rgba(201,169,110,.5)}
.bday-month-date{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:54px;padding:6px 0;border-radius:10px;background:rgba(46,86,101,.55);border:1px solid var(--border-soft)}
.bday-month-row.today .bday-month-date{background:var(--gold);border-color:var(--gold-light)}
.bday-month-month{font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold-light);font-weight:700}
.bday-month-row.today .bday-month-month{color:var(--bp-darker)}
.bday-month-day{font-family:'Righteous',sans-serif;font-size:20px;color:var(--white);line-height:1;margin-top:2px}
.bday-month-row.today .bday-month-day{color:var(--bp-darker)}
.bday-month-photo{width:46px;height:46px;border-radius:50%;border:2px solid var(--gold);flex-shrink:0;overflow:hidden;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-family:'Righteous',sans-serif;font-size:14px;color:var(--gold-light)}
.bday-month-photo img{width:100%;height:100%;object-fit:cover}
.bday-month-info{flex:1;min-width:0}
.bday-month-name{font-family:'Righteous',sans-serif;font-size:16px;color:var(--white);letter-spacing:.2px;line-height:1.1;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bday-month-breed{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bday-month-age{font-size:11px;font-weight:700;color:var(--gold-light);letter-spacing:.5px;flex-shrink:0}
.bday-month-age.turning{color:var(--gold)}

.state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px}
.state-icon{width:72px;height:72px;border-radius:50%;background:var(--glass);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--gold-light)}
.state-icon svg{width:34px;height:34px}
.state-title{font-family:'Righteous',sans-serif;font-size:22px;color:var(--white);letter-spacing:.3px}
.state-text{font-size:13px;color:var(--muted);letter-spacing:.3px;line-height:1.5;max-width:340px}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.14);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-banner{position:fixed;top:74px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(215,107,0,.95);color:var(--white);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 8px 22px rgba(0,0,0,.3);display:none;max-width:90vw}
.error-banner.show{display:block}

@media(max-width:768px){
  .slide{flex-direction:column}
  .slide-half{border-right:none;border-bottom:1px solid rgba(255,255,255,.16)}
  .slide-half:last-child{border-bottom:none}
  .slide-info{padding:0 22px 28px}
  .arrow{width:36px;height:36px}
  .arrow.prev{left:8px}
  .arrow.next{right:8px}
}
@media(max-width:640px){
  .topbar-inner{height:54px;gap:6px}
  .brand-name{font-size:12px}
  .brand-loc{font-size:8px;letter-spacing:1.5px}
  .brand-mark{width:32px;height:32px}
  .live-pill{padding:3px 8px;font-size:9px}
  .live-pill .live-label{display:none}
  .mode-btn{padding:5px 9px;font-size:9px;letter-spacing:.8px}
  .mode-btn .mode-label{display:none}
  .clock-time{font-size:14px}
  .clock-date{font-size:8px;letter-spacing:1.1px}
  .list-inner{padding:18px 14px 50px}
  .page-title{font-size:24px}
  .dog-grid{grid-template-columns:1fr;gap:10px}
  .splash-logo{width:90px;height:90px}
  .splash-brand{font-size:22px}
  .splash-loc{font-size:10px;letter-spacing:2.5px}
  .bday-month{padding:20px 14px 50px}
  .bday-month-title{font-size:24px}
}
@media(prefers-reduced-motion:reduce){

function escapeHtml(s){
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function tsToDate(ts){
  if(!ts) return null;
  if(ts instanceof Date) return ts;
  if(ts.toDate) return ts.toDate();
  if(ts.seconds !== undefined) return new Date(ts.seconds * 1000);
  if(typeof ts === 'string'){
    const d = new Date(ts);
    return Number.isNaN(d.getTime()) ? null : d;
  }
  return null;
}

function startOfToday(){
  const d = new Date();
  d.setHours(0,0,0,0);
  return d;
}

function isSameDay(a, b){
  return !!(a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate());
}

function isAfter1930(now){
  return now.getHours() > 19 || (now.getHours() === 19 && now.getMinutes() >= 30);
}

function isBirthdayToday(dob){
  const d = tsToDate(dob);
  if(!d) return null;
  const n = new Date();
  if(d.getMonth() === n.getMonth() && d.getDate() === n.getDate()){
    const age = n.getFullYear() - d.getFullYear();
    return age >= 0 ? age : null;
  }
  return null;
}

function calcAge(dob){
  const d = tsToDate(dob);
  if(!d) return '';
  const n = new Date();
  let years = n.getFullYear() - d.getFullYear();
  let months = n.getMonth() - d.getMonth();
  if(n.getDate() < d.getDate()) months -= 1;
  if(months < 0){
    years -= 1;
    months += 12;
  }
  if(years < 0) return '';
  if(years === 0){
    if(months <= 0) return '< 1 mo';
    return `${months} mo`;
  }
  const yLabel = `${years} yr${years !== 1 ? 's' : ''}`;
  return months === 0 ? yLabel : `${yLabel} ${months} mo`;
}

function dogPhoto(d){

function dogInitials(n){

function fixedLabel(d){

  if(d.gender === 'male') return d.fixed ? 'Neutered' : 'Intact';
  if(d.gender === 'female') return d.fixed ? 'Spayed' : 'Intact';

function fmtCheckoutBadge(co){

  const t = new Date();
  if(isSameDay(d, t)){

    return `Out ${((h + 11) % 12) + 1}:${String(m).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;

  return `Out ${d.toLocaleDateString([], {month:'short', day:'numeric'})}`;
}

  if(s.includes('board') || s.includes('slumber')) return 'boarding';
  if(s.includes('half')) return 'halfday';
  if(s.includes('full') || s.includes('daycare') || s.includes('day care')) return 'fullday';
  return 'other';
}

}

  const s = ['th','st','nd','rd'];

setTimeout(hideSplash, SPLASH_MAX_MS);

function scheduleIdle(fn, timeout = 800){
  if(supportsIdle && !document.hidden){
    requestIdleCallback(() => fn(), {timeout});
    return;
  }
  setTimeout(fn, 60);
}

function rememberLimited(map, key, value, max){
  if(map.has(key)) map.delete(key);
  map.set(key, value);
  if(map.size > max){
    const oldest = map.keys().next().value;
    map.delete(oldest);
  }
}

function updateDeferredImages(attrName, sourceUrl, resolvedUrl){
  if(!sourceUrl || !resolvedUrl) return;
  const nodes = document.querySelectorAll(`img[${attrName}]`);
  for(const node of nodes){
    if(node.getAttribute(attrName) === sourceUrl){
      if(node.getAttribute('src') !== resolvedUrl) node.setAttribute('src', resolvedUrl);
      node.removeAttribute(attrName);
    }
  }
}

function updateBackdropImages(sourceUrl, resolvedUrl){
  if(!sourceUrl || !resolvedUrl) return;
  const nodes = document.querySelectorAll('img[data-backdrop-source]');
  for(const node of nodes){
    if(node.getAttribute('data-backdrop-source') === sourceUrl){
      if(node.getAttribute('src') !== resolvedUrl) node.setAttribute('src', resolvedUrl);
      node.removeAttribute('data-backdrop-source');
    }
  }
}

function loadImage(url, priority = 'low'){
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.decoding = 'async';
    try{ img.fetchPriority = priority; }catch{}
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

async function rasterizeVariant(url, size, quality){
  const img = await loadImage(url, 'low');
  if(!img) return null;
  try{
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d', {alpha:false, desynchronized:true});
    if(!ctx) return null;
    ctx.imageSmoothingEnabled = true;
    if('imageSmoothingQuality' in ctx) ctx.imageSmoothingQuality = size <= 160 ? 'medium' : 'high';

    let source = img;
    if(typeof createImageBitmap === 'function'){
      try{ source = await createImageBitmap(img); }catch{}
    }

    const sw = source.width || img.naturalWidth;
    const sh = source.height || img.naturalHeight;
    if(!sw || !sh){
      if(source !== img && source.close) source.close();
      return null;
    }

    const scale = Math.max(size / sw, size / sh);
    const dw = sw * scale;
    const dh = sh * scale;
    const dx = (size - dw) / 2;
    const dy = (size - dh) / 2;
    ctx.drawImage(source, dx, dy, dw, dh);
    const dataUrl = canvas.toDataURL('image/jpeg', quality);
    if(source !== img && source.close) source.close();
    return dataUrl;
  }catch{
    return null;
  }
}

function makeVariant(url, size, quality, cache, inFlight, max){
  if(!url) return Promise.resolve(null);
  if(cache.has(url)) return Promise.resolve(cache.get(url));
  if(inFlight.has(url)) return inFlight.get(url);
  const promise = rasterizeVariant(url, size, quality)
    .then(dataUrl => {
      rememberLimited(cache, url, dataUrl, max);
      return dataUrl;
    })
    .catch(() => {
      rememberLimited(cache, url, null, max);
      return null;
    })
    .finally(() => {
      inFlight.delete(url);
    });
  inFlight.set(url, promise);
  return promise;
}

function makeThumb(url){
  return makeVariant(url, THUMB_SIZE, 0.82, thumbCache, thumbInFlight, MAX_THUMBS);
}

function makeBackdrop(url){
  return makeVariant(url, BACKDROP_SIZE, 0.74, backdropCache, backdropInFlight, MAX_BACKDROPS);
}

function pumpThumbQueue(){
  while(thumbActive < THUMB_CONCURRENCY && thumbQueue.length){
    const url = thumbQueue.shift();
    thumbQueued.delete(url);
    thumbActive += 1;
    makeThumb(url)
      .then(dataUrl => updateDeferredImages('data-thumb-source', url, dataUrl))
      .finally(() => {
        thumbActive -= 1;
        if(thumbQueue.length) scheduleIdle(pumpThumbQueue, 500);
      });
  }
}

function pumpBackdropQueue(){
  while(backdropActive < BACKDROP_CONCURRENCY && backdropQueue.length){
    const url = backdropQueue.shift();
    backdropQueued.delete(url);
    backdropActive += 1;
    makeBackdrop(url)
      .then(dataUrl => updateBackdropImages(url, dataUrl))
      .finally(() => {
        backdropActive -= 1;
        if(backdropQueue.length) scheduleIdle(pumpBackdropQueue, 500);
      });
  }
}

function queueThumb(url, immediate = false){
  if(!url || thumbCache.has(url) || thumbInFlight.has(url) || thumbQueued.has(url)) return;
  thumbQueued.add(url);
  if(immediate) thumbQueue.unshift(url);
  else thumbQueue.push(url);
  pumpThumbQueue();
}

function queueBackdrop(url, immediate = false){
  if(!url || backdropCache.has(url) || backdropInFlight.has(url) || backdropQueued.has(url)) return;
  backdropQueued.add(url);
  if(immediate) backdropQueue.unshift(url);
  else backdropQueue.push(url);
  pumpBackdropQueue();
}

function predecode(url, priority = 'low'){
  if(!url || decodedUrls.has(url) || predecodeInFlight.has(url)) return;
  const promise = loadImage(url, priority)
    .then(img => {
      if(!img) return;
      decodedUrls.add(url);
      if(img.decode) return img.decode().catch(() => {});
    })
    .finally(() => {
      predecodeInFlight.delete(url);
    });
  predecodeInFlight.set(url, promise);
}

function warmupThumbs(dogs){
  const seen = new Set();
  for(const dog of dogs){
    const url = dogPhoto(dog);
    if(!url || seen.has(url)) continue;
    seen.add(url);
    queueThumb(url, false);
  }
}

function primeDisplayAssets(items, immediate = false){
  for(const item of items){
    const url = dogPhoto(item.dog || item);
    if(!url) continue;
    predecode(url, immediate ? 'high' : 'low');
    queueBackdrop(url, immediate);
  }
}

function primeBirthdayAssets(dogs){
  if(!dogs.length) return;
  const current = dogs[bdayCurIdx] || dogs[0];
  const next = dogs[(bdayCurIdx + 1) % dogs.length] || current;
  const currentUrl = dogPhoto(current);
  const nextUrl = dogPhoto(next);
  if(currentUrl) predecode(currentUrl, 'high');
  if(nextUrl && nextUrl !== currentUrl) predecode(nextUrl, 'low');
}

function tickClock(){
  const n = new Date();
  $('clk-time').textContent = n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:true});
  $('clk-date').textContent = n.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
}

tickClock();
setInterval(tickClock, 30000);

setInterval(() => {
  const now = new Date();
  const boundary = isAfter1930(now);
  const dateKey = now.toDateString();
  if(boundary !== lastBoundary || dateKey !== lastDateKey){
    lastBoundary = boundary;
    lastDateKey = dateKey;
    requestRender(true);
  }
}, 60000);

function shouldShow(appt, now, afterBoundary){
  const status = String(appt.status || '').toLowerCase();
  if(['canceled','cancelled','no_show'].includes(status)) return false;
  const ci = tsToDate(appt.checkInAt || appt.checkInTime || appt.startDate);
  const co = tsToDate(appt.endDate || appt.checkOutTime);
  if(!ci) return false;
  if(ci > now) return false;
  if(!co) return true;
  if(co < now && !isSameDay(co, now)) return false;
  if(afterBoundary && isSameDay(co, now)) return false;
  return true;
}

function score(appt){
  let s = 0;
  if(appt.status === 'checked_in') s += 1e9;
  const t = tsToDate(appt.checkInAt || appt.startDate || appt.updatedAt || appt.createdAt);
  if(t) s += t.getTime() / 1000;
  return s;
}

async function ensureDog(dogId){
  if(!dogId) return null;
  if(dogCache.has(dogId)) return dogCache.get(dogId);
  if(dogInFlight.has(dogId)) return dogInFlight.get(dogId);

  const promise = getDoc(doc(db, 'locations', LOCATION_ID, 'dogs', dogId))
    .then(snap => {
      const dog = snap.exists() ? {id:snap.id, ...snap.data()} : null;
      dogCache.set(dogId, dog);
      return dog;
    })
    .catch(err => {
      console.error('ensureDog fail', dogId, err);
      return null;
    })
    .finally(() => {
      dogInFlight.delete(dogId);
    });

  dogInFlight.set(dogId, promise);
  return promise;
}

async function buildVisibleDogs(){
  const now = new Date();
  const afterBoundary = isAfter1930(now);
  const filtered = currentAppointments.filter(appt => shouldShow(appt, now, afterBoundary));
  const uniqueIds = [];
  const seen = new Set();

  for(const appt of filtered){
    const dogId = appt.dogId;
    if(dogId && !seen.has(dogId)){
      seen.add(dogId);
      uniqueIds.push(dogId);
    }
  }

  await Promise.all(uniqueIds.map(ensureDog));

  const byDog = new Map();
  for(const appt of filtered){
    const dog = dogCache.get(appt.dogId);
    if(!dog) continue;
    const existing = byDog.get(dog.id);
    const entry = {appt, dog};
    if(!existing || score(appt) > score(existing.appt)) byDog.set(dog.id, entry);
  }

  visibleDogs = [...byDog.values()];
  visibleDogs.sort((a, b) => {
    const aB = isBirthdayToday(a.dog.dob) !== null ? 1 : 0;
    const bB = isBirthdayToday(b.dog.dob) !== null ? 1 : 0;
    if(aB !== bB) return bB - aB;
    const ca = tsToDate(a.appt.checkInAt || a.appt.startDate)?.getTime() || 0;
    const cb = tsToDate(b.appt.checkInAt || b.appt.startDate)?.getTime() || 0;
    return ca - cb;
  });
}

async function ensureAllLocationDogs(){
  if(allLocationDogs !== null) return allLocationDogs;
  if(allLocationDogsLoading) return null;
  allLocationDogsLoading = true;
  try{
    const snap = await getDocs(collection(db, 'locations', LOCATION_ID, 'dogs'));
    allLocationDogs = snap.docs.map(d => {
      const dog = {id:d.id, ...d.data()};
      dogCache.set(d.id, dog);
      return dog;
    });
    return allLocationDogs;
  }catch(err){
    console.error('ensureAllLocationDogs fail', err);
    allLocationDogs = [];
    return allLocationDogs;
  }finally{
    allLocationDogsLoading = false;
  }
}

function birthdayDogsToday(){
  return visibleDogs.filter(({dog}) => isBirthdayToday(dog.dob) !== null).map(({dog}) => dog);
}

function birthdayDogsThisMonth(allDogs){
  if(!allDogs) return [];
  const now = new Date();
  const month = now.getMonth();
  const today = now.getDate();
  const list = [];
  for(const dog of allDogs){
    const d = tsToDate(dog.dob);
    if(!d || d.getMonth() !== month) continue;
    list.push({dog, day:d.getDate(), date:d});
  }
  list.sort((a, b) => {
    const aFuture = a.day >= today ? 0 : 1;
    const bFuture = b.day >= today ? 0 : 1;
    if(aFuture !== bFuture) return aFuture - bFuture;
    return a.day - b.day;
  });
  return list;
}

function buildRenderKey(){
  return visibleDogs.map(e => [
    e.appt.id,
    e.dog.id,
    e.appt.status || '',
    e.appt.type || e.appt.reservation_type || e.appt.reservationType || '',
    e.appt.endDate?.seconds || 0,
    e.dog.customerPhotoUrl || e.dog.gingrPhotoUrl || e.dog.photoUrl || '',
    e.dog.dob?.seconds || e.dog.dob || ''
  ].join(':')).join('|') + '#' + currentMode + '#' + (isMobile() ? 'm' : 'd');
}

function requestRender(force = false){
  renderPendingForce = renderPendingForce || force;
  if(force) lastRenderedKey = null;
  if(renderRequested) return;
  renderRequested = true;

  requestAnimationFrame(async () => {
    renderRequested = false;
    const forceNow = renderPendingForce;
    renderPendingForce = false;

    if(document.hidden) return;

    await buildVisibleDogs();
    const key = buildRenderKey();
    if(key === lastRenderedKey && !forceNow){
      hideSplash();
      return;
    }

    lastRenderedKey = key;
    warmupThumbs(visibleDogs.map(v => v.dog));
    updateBirthdayIndicator();

    if(currentMode === 'list') renderList();
    else if(currentMode === 'birthday') await renderBirthday();
    else renderDisplay();

    lastRenderedMode = currentMode;
    hideSplash();
  });
}

function updateBirthdayIndicator(){
  $('bday-indicator').classList.toggle('show', birthdayDogsToday().length > 0);
}

function renderLoadingState(root, relative = false, title = 'Loading guests…'){
  root.innerHTML = `<div class="state"${relative ? ' style="position:relative;padding:80px 24px"' : ''}><div class="spinner"></div><div class="state-title">${escapeHtml(title)}</div></div>`;
}

function renderEmptyState(root, relative = false){
  root.innerHTML = `
    <div class="state"${relative ? ' style="position:relative;padding:80px 24px"' : ''}>
      <div class="state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg></div>
      <div class="state-title">No guests right now</div>
      <div class="state-text">Check-ins will appear here automatically.</div>
    </div>`;
}

function renderList(){
  const root = $('list-content');
  if(!hasLoadedAppointments){
    renderLoadingState(root, true);
    return;
  }

  const buckets = {halfday:[], fullday:[], boarding:[], other:[]};
  for(const e of visibleDogs){
    const t = normalizeType(e.appt.type || e.appt.reservation_type || e.appt.reservationType);
    (buckets[t] || buckets.other).push(e);
  }
  Object.values(buckets).forEach(arr => arr.sort((a, b) => String(a.dog.name || '').localeCompare(String(b.dog.name || ''))));

  $('stat-total').textContent = String(visibleDogs.length);
  $('stat-boarding').textContent = String(buckets.boarding.length);

  if(visibleDogs.length === 0){
    renderEmptyState(root, true);
    return;
  }

  let html = '';
  for(const def of SECTION_DEFS){
    const items = buckets[def.key];
    if(!items.length) continue;
    html += `<section class="section">
      <div class="section-head">
        <div class="section-icon">${def.icon}</div>
        <h2 class="section-title">${def.label}</h2>
        <span class="section-count">${items.length} dog${items.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="dog-grid">${items.map(renderListCard).join('')}</div>
    </section>`;
  }
  root.innerHTML = html;
}

function renderListCard({appt, dog}){
  const photo = dogPhoto(dog);
  const initials = dogInitials(dog.name);
  const thumb = photo ? thumbCache.get(photo) : '';
  const imgSrc = thumb || photo;
  const deferredAttr = photo && !thumb ? ` data-thumb-source="${escapeHtml(photo)}"` : '';
  const photoInner = photo
    ? `<img src="${escapeHtml(imgSrc)}"${deferredAttr} alt="" loading="lazy" decoding="async" fetchpriority="low" width="58" height="58"/>`
    : initials;

  const bdayAge = isBirthdayToday(dog.dob);
  const age = calcAge(dog.dob);
  const gender = genderLabel(dog.gender);
  const fixed = fixedLabel(dog);
  const co = tsToDate(appt.endDate || appt.checkOutTime);
  const isMultiDay = !!(co && !isSameDay(co, new Date()));
  const checkoutBadge = fmtCheckoutBadge(appt.endDate || appt.checkOutTime);
  const badges = [];

  if(checkoutBadge) badges.push(`<span class="badge ${isMultiDay ? 'boarding' : 'checkout'}">${checkoutBadge}</span>`);
  if(gender) badges.push(`<span class="badge">${gender}</span>`);
  if(fixed) badges.push(`<span class="badge">${fixed}</span>`);
  if(age) badges.push(`<span class="badge gold">${age}</span>`);

  return `<article class="dog-card">
    ${bdayAge !== null ? '<div class="dog-bday" title="Birthday today!">🎂</div>' : ''}
    <div class="dog-photo">${photoInner}</div>
    <div class="dog-info">
      <div class="dog-name">${escapeHtml(dog.name || '—')}</div>
      <div class="dog-breed">${escapeHtml(dog.breed || '—')}</div>
      <div class="dog-badges">${badges.join('')}</div>
    </div>
  </article>`;
}

function buildPairs(){
  const step = isMobile() ? 1 : 2;
  const nextPairs = [];
  for(let i = 0; i < visibleDogs.length; i += step){
    nextPairs.push(visibleDogs.slice(i, i + step));
  }
  pairs = nextPairs;
  if(curIdx >= pairs.length) curIdx = 0;
}

function renderDisplay(){
  const ss = $('slideshow');
  if(!hasLoadedAppointments){
    renderLoadingState(ss, false);
    return;
  }

  if(visibleDogs.length === 0){
    stopAutoplay();
    renderEmptyState(ss, false);
    $('counter').style.display = 'none';
    $('prev').style.display = 'none';
    $('next').style.display = 'none';
    $('dots').innerHTML = '';
    pairs = [];
    return;
  }

  buildPairs();
  ss.innerHTML = `<div class="slide">${pairs[curIdx].map(renderSlideHalf).join('')}</div>`;

  const counter = $('counter');
  counter.style.display = '';
  counter.textContent = `${visibleDogs.length} ${visibleDogs.length === 1 ? 'guest' : 'guests'} today`;

  if(pairs.length > 1){
    $('dots').innerHTML = pairs.map((_, i) => `<button class="dot${i === curIdx ? ' on' : ''}" data-idx="${i}" type="button" aria-label="Go to slide ${i + 1}"></button>`).join('');
    $('prev').style.display = '';
    $('next').style.display = '';
  }else{
    $('dots').innerHTML = '';
    $('prev').style.display = 'none';
    $('next').style.display = 'none';
  }

  primeDisplayAssets(pairs[curIdx], true);
  schedulePredecodeNext();
  if(currentMode === 'display' && !document.hidden) startAutoplay();
}

function schedulePredecodeNext(){
  if(pairs.length <= 1) return;
  const nextIdx = (curIdx + 1) % pairs.length;
  const nextPair = pairs[nextIdx] || [];
  scheduleIdle(() => primeDisplayAssets(nextPair, false), 1200);
}

function renderSlideHalf({appt, dog}){
  const photo = dogPhoto(dog);
  const backdrop = photo ? (backdropCache.get(photo) || thumbCache.get(photo) || photo) : '';
  const backdropAttr = photo && !backdropCache.has(photo) ? ` data-backdrop-source="${escapeHtml(photo)}"` : '';
  const bdayAge = isBirthdayToday(dog.dob);
  const age = calcAge(dog.dob);
  const gender = genderLabel(dog.gender);
  const fixed = fixedLabel(dog);
  const co = tsToDate(appt.endDate || appt.checkOutTime);
  const isMultiDay = !!(co && !isSameDay(co, new Date()));
  const checkoutBadge = fmtCheckoutBadge(appt.endDate || appt.checkOutTime);
  const svcLabel = typeShortLabel(appt.type || appt.reservation_type || appt.reservationType);
  const badges = [];

  if(svcLabel) badges.push(`<span class="slide-badge gold">${escapeHtml(svcLabel)}</span>`);
  if(checkoutBadge) badges.push(`<span class="slide-badge ${isMultiDay ? 'gold' : 'orange'}">${checkoutBadge}</span>`);
  if(gender) badges.push(`<span class="slide-badge">${gender}</span>`);
  if(fixed) badges.push(`<span class="slide-badge">${fixed}</span>`);
  if(age) badges.push(`<span class="slide-badge">${age}</span>`);

  const photoBlock = photo
    ? `<img class="slide-photo-bg" src="${escapeHtml(backdrop)}"${backdropAttr} alt="" decoding="async" aria-hidden="true"/>
       <img class="slide-photo" src="${escapeHtml(photo)}" alt="" decoding="async" fetchpriority="high"/>`
    : `<div class="bg-fallback">${dogInitials(dog.name)}</div>`;

  return `<div class="slide-half${bdayAge !== null ? ' bday' : ''}">
    ${photoBlock}
    <div class="bg-overlay"></div>
    ${bdayAge !== null ? `<div class="bday-banner">🎂 Happy ${ord(bdayAge)} Birthday, ${escapeHtml(String(dog.name || '').split(' ')[0])}!</div>` : ''}
    <div class="slide-info">
      <div class="slide-name">${escapeHtml(dog.name || '—')}</div>
      <div class="slide-breed">${escapeHtml(dog.breed || '—')}</div>
      <div class="slide-badges">${badges.join('')}</div>
    </div>
  </div>`;
}

function goTo(idx){
  if(!pairs.length) return;
  curIdx = ((idx % pairs.length) + pairs.length) % pairs.length;
  $('slideshow').innerHTML = `<div class="slide">${pairs[curIdx].map(renderSlideHalf).join('')}</div>`;
  const dots = $('dots').querySelectorAll('.dot');
  for(let i = 0; i < dots.length; i += 1){
    dots[i].classList.toggle('on', i === curIdx);
  }
  primeDisplayAssets(pairs[curIdx], true);
  schedulePredecodeNext();
  if(!document.hidden) startAutoplay();
}

function startAutoplay(){
  stopAutoplay();
  if(pairs.length <= 1 || currentMode !== 'display' || document.hidden) return;
  const bar = $('progress');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    bar.style.transition = `width ${SLIDE_DURATION}ms linear`;
    bar.style.width = '100%';
  });
  slideTimer = setTimeout(() => goTo(curIdx + 1), SLIDE_DURATION);
}

function stopAutoplay(){
  if(slideTimer){
    clearTimeout(slideTimer);
    slideTimer = null;
  }
  const bar = $('progress');
  if(bar){
    bar.style.transition = 'none';
    bar.style.width = '0%';
  }
}

async function renderBirthday(){
  const root = $('birthday-content');
  const todayDogs = birthdayDogsToday();

  if(!hasLoadedAppointments && allLocationDogs === null){
    root.innerHTML = `<div class="bday-month"><div class="bday-month-empty"><div class="spinner" style="margin:0 auto 18px"></div><div class="state-title">Loading birthdays…</div></div></div>`;
    return;
  }

  if(todayDogs.length > 0){
    stopBdayAutoplay();
    if(bdayCurIdx >= todayDogs.length) bdayCurIdx = 0;
    primeBirthdayAssets(todayDogs);
    root.innerHTML = renderBdayHero(todayDogs[bdayCurIdx], todayDogs.length, bdayCurIdx, todayDogs);
    if(todayDogs.length > 1 && !document.hidden) startBdayAutoplay(todayDogs);
    return;
  }

  if(allLocationDogs === null){
    root.innerHTML = `<div class="bday-month"><div class="bday-month-empty"><div class="spinner" style="margin:0 auto 18px"></div><div class="state-title">Loading birthdays…</div></div></div>`;
    await ensureAllLocationDogs();
    if(currentMode !== 'birthday') return;
  }

  const monthList = birthdayDogsThisMonth(allLocationDogs);
  warmupThumbs(monthList.map(item => item.dog));
  const monthName = new Date().toLocaleDateString([], {month:'long', year:'numeric'});

  if(monthList.length === 0){
    root.innerHTML = `
      <div class="bday-month">
        <div class="bday-month-head">
          <h1 class="bday-month-title">🎂 Birthdays</h1>
          <div class="bday-month-sub">${escapeHtml(monthName)}</div>
        </div>
        <div class="bday-month-empty">
          <div class="bday-month-empty-icon">🎂</div>
          <div class="state-title">No birthdays this month</div>
          <div class="state-text" style="margin:8px auto 0">Check back next month!</div>
        </div>
      </div>`;
    return;
  }

  const today = new Date().getDate();
  let html = `<div class="bday-month">
    <div class="bday-month-head">
      <h1 class="bday-month-title">🎂 Birthdays</h1>
      <div class="bday-month-sub">${escapeHtml(monthName)} · ${monthList.length} dog${monthList.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="bday-month-list">`;

  for(const item of monthList){
    const {dog, day, date} = item;
    const photo = dogPhoto(dog);
    const thumb = photo ? thumbCache.get(photo) : '';
    const imgSrc = thumb || photo;
    const deferredAttr = photo && !thumb ? ` data-thumb-source="${escapeHtml(photo)}"` : '';
    const photoInner = photo
      ? `<img src="${escapeHtml(imgSrc)}"${deferredAttr} alt="" loading="lazy" decoding="async" fetchpriority="low" width="46" height="46"/>`
      : dogInitials(dog.name);
    const isToday = day === today;
    const turningAge = new Date().getFullYear() - date.getFullYear();
    const ageLabel = turningAge >= 0 && turningAge < 30 ? (isToday ? `Turns ${turningAge}` : `Turning ${turningAge}`) : '';

    html += `<div class="bday-month-row${isToday ? ' today' : ''}">
      <div class="bday-month-date">
        <span class="bday-month-month">${MONTH_SHORT[date.getMonth()]}</span>
        <span class="bday-month-day">${day}</span>
      </div>
      <div class="bday-month-photo">${photoInner}</div>
      <div class="bday-month-info">
        <div class="bday-month-name">${escapeHtml(dog.name || '—')}</div>
        <div class="bday-month-breed">${escapeHtml(dog.breed || '—')}</div>
      </div>
      ${ageLabel ? `<div class="bday-month-age${isToday ? ' turning' : ''}">${escapeHtml(ageLabel)}</div>` : ''}
    </div>`;
  }

  html += `</div></div>`;
  root.innerHTML = html;
}

function renderBdayHero(dog, total, idx, allDogs){
  const photo = dogPhoto(dog);
  const photoInner = photo
    ? `<img src="${escapeHtml(photo)}" alt="" decoding="async" fetchpriority="high"/>`
    : `<div class="bday-hero-photo-fallback">${dogInitials(dog.name)}</div>`;
  const age = isBirthdayToday(dog.dob);
  const breed = dog.breed || '';

  const confetti = CONFETTI_STYLES.map(style => `<div class="confetti-piece" style="${style}"></div>`).join('');
  const counter = total > 1 ? `<div class="bday-hero-counter">${idx + 1} / ${total}</div>` : '';
  const dots = total > 1 ? `<div class="bday-hero-dots">${allDogs.map((_, i) => `<span class="dot${i === idx ? ' on' : ''}"></span>`).join('')}</div>` : '';

  return `<div class="bday-hero">
    ${confetti}
    ${counter}
    <div class="bday-hero-photo-frame">${photoInner}</div>
    <div class="bday-hero-greeting">Happy Birthday</div>
    <div class="bday-hero-name">${escapeHtml(dog.name || '—')}</div>
    ${age !== null ? `<div class="bday-hero-age">Turning ${age}</div>` : ''}
    ${breed ? `<div class="bday-hero-breed">${escapeHtml(breed)}</div>` : ''}
    ${dots}
  </div>`;
}

function startBdayAutoplay(dogs){
  stopBdayAutoplay();
  if(dogs.length <= 1 || currentMode !== 'birthday' || document.hidden) return;
  bdayTimer = setTimeout(() => {
    bdayCurIdx = (bdayCurIdx + 1) % dogs.length;
    renderBirthday();
  }, BDAY_HERO_DURATION);
}

function stopBdayAutoplay(){
  if(bdayTimer){
    clearTimeout(bdayTimer);
    bdayTimer = null;
  }
}

function setMode(mode){
  const previousMode = currentMode;
  currentMode = mode;
  safeSetMode(mode);

  $('btn-display').classList.toggle('on', mode === 'display');
  $('btn-list').classList.toggle('on', mode === 'list');
  $('btn-birthday').classList.toggle('on', mode === 'birthday');
  $('display').classList.toggle('on', mode === 'display');
  $('list').classList.toggle('on', mode === 'list');
  $('birthday').classList.toggle('on', mode === 'birthday');

  if(previousMode && previousMode !== mode){
    if(previousMode === 'display'){
      $('slideshow').innerHTML = '';
      pairs = [];
      curIdx = 0;
      stopAutoplay();
    }else if(previousMode === 'birthday'){
      $('birthday-content').innerHTML = '';
      bdayCurIdx = 0;
      stopBdayAutoplay();
    }
  }

  if(mode === 'list') renderList();
  else if(mode === 'birthday') renderBirthday();
  else renderDisplay();

  lastRenderedMode = mode;
}

$('prev').addEventListener('click', () => goTo(curIdx - 1));
$('next').addEventListener('click', () => goTo(curIdx + 1));
$('dots').addEventListener('click', evt => {
  const target = evt.target.closest('.dot');
  if(!target) return;
  goTo(Number(target.dataset.idx || 0));
});

document.addEventListener('keydown', evt => {
  if(currentMode !== 'display') return;
  if(evt.key === 'ArrowLeft') goTo(curIdx - 1);
  if(evt.key === 'ArrowRight') goTo(curIdx + 1);
});

window.addEventListener('resize', () => {
  const nowMobile = isMobile();
  if(nowMobile !== lastWasMobile){
    lastWasMobile = nowMobile;
    requestRender(true);
  }
});

document.addEventListener('visibilitychange', () => {
  if(document.hidden){
    stopAutoplay();
    stopBdayAutoplay();
    return;
  }
  requestRender(true);
});

setMode(currentMode);
renderLoadingState($('slideshow'));
renderLoadingState($('list-content'), true);

const apptCol = collection(db, 'locations', LOCATION_ID, 'appointments');
const q = query(apptCol, where('endDate', '>=', Timestamp.fromDate(startOfToday())));

const unsub = onSnapshot(q,
  snap => {
    const changes = snap.docChanges();
    if(changes.length){
      for(const change of changes){
        if(change.type === 'removed') appointmentMap.delete(change.doc.id);
        else appointmentMap.set(change.doc.id, {id:change.doc.id, ...change.doc.data()});
      }
    }else{
      appointmentMap.clear();
      snap.forEach(docSnap => appointmentMap.set(docSnap.id, {id:docSnap.id, ...docSnap.data()}));
    }
    currentAppointments = [...appointmentMap.values()];
    hasLoadedAppointments = true;
    requestRender(true);
  },
  err => {
    console.error('Snapshot error', err);
    $('err').textContent = `Connection error: ${err.message || err.code || 'unknown'}`;
    $('err').classList.add('show');
    hideSplash();
  }
);

window.addEventListener('beforeunload', () => {
  try{ unsub(); }catch{}
});
</script>
</body>
</html>
